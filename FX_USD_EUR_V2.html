<script>
(function() {
var DEFAULT_FROM = "EUR";
var DEFAULT_TO   = "USD";
var TIER1        = {"AUD": "Australian Dollar", "BGN": "Bulgarian Lev", "BRL": "Brazilian Real", "CAD": "Canadian Dollar", "CHF": "Swiss Franc", "CNY": "Chinese Yuan", "CZK": "Czech Koruna", "DKK": "Danish Krone", "EUR": "Euro", "GBP": "British Pound", "HKD": "Hong Kong Dollar", "HUF": "Hungarian Forint", "IDR": "Indonesian Rupiah", "ILS": "Israeli Shekel", "INR": "Indian Rupee", "ISK": "Icelandic Krona", "JPY": "Japanese Yen", "KRW": "South Korean Won", "MXN": "Mexican Peso", "MYR": "Malaysian Ringgit", "NOK": "Norwegian Krone", "NZD": "New Zealand Dollar", "PHP": "Philippine Peso", "PLN": "Polish Zloty", "RON": "Romanian Leu", "SEK": "Swedish Krone", "SGD": "Singapore Dollar", "THB": "Thai Baht", "TRY": "Turkish Lira", "USD": "US Dollar", "ZAR": "South African Rand"};
var TIER2        = {"AED": "UAE Dirham", "AFN": "Afghan Afghani", "ALL": "Albanian Lek", "AMD": "Armenian Dram", "ANG": "Netherlands Antillean Guilder", "AOA": "Angolan Kwanza", "ARS": "Argentine Peso", "AWG": "Aruban Florin", "AZN": "Azerbaijani Manat", "BAM": "Bosnia-Herzegovina Mark", "BBD": "Barbadian Dollar", "BDT": "Bangladeshi Taka", "BHD": "Bahraini Dinar", "BIF": "Burundian Franc", "BMD": "Bermudian Dollar", "BND": "Brunei Dollar", "BOB": "Bolivian Boliviano", "BSD": "Bahamian Dollar", "BTN": "Bhutanese Ngultrum", "BWP": "Botswanan Pula", "BYN": "Belarusian Ruble", "BZD": "Belize Dollar", "CDF": "Congolese Franc", "CLP": "Chilean Peso", "COP": "Colombian Peso", "CRC": "Costa Rican Colon", "CUP": "Cuban Peso", "CVE": "Cape Verdean Escudo", "DJF": "Djiboutian Franc", "DOP": "Dominican Peso", "DZD": "Algerian Dinar", "EGP": "Egyptian Pound", "ERN": "Eritrean Nakfa", "ETB": "Ethiopian Birr", "FJD": "Fijian Dollar", "FKP": "Falkland Islands Pound", "GEL": "Georgian Lari", "GHS": "Ghanaian Cedi", "GIP": "Gibraltar Pound", "GMD": "Gambian Dalasi", "GNF": "Guinean Franc", "GTQ": "Guatemalan Quetzal", "GYD": "Guyanaese Dollar", "HNL": "Honduran Lempira", "HTG": "Haitian Gourde", "IQD": "Iraqi Dinar", "IRR": "Iranian Rial", "JMD": "Jamaican Dollar", "JOD": "Jordanian Dinar", "KES": "Kenyan Shilling", "KGS": "Kyrgystani Som", "KHR": "Cambodian Riel", "KMF": "Comorian Franc", "KPW": "North Korean Won", "KWD": "Kuwaiti Dinar", "KYD": "Cayman Islands Dollar", "KZT": "Kazakhstani Tenge", "LAK": "Laotian Kip", "LBP": "Lebanese Pound", "LKR": "Sri Lankan Rupee", "LRD": "Liberian Dollar", "LSL": "Lesotho Loti", "LYD": "Libyan Dinar", "MAD": "Moroccan Dirham", "MDL": "Moldovan Leu", "MGA": "Malagasy Ariary", "MKD": "Macedonian Denar", "MMK": "Myanma Kyat", "MNT": "Mongolian Tugrik", "MOP": "Macanese Pataca", "MRU": "Mauritanian Ouguiya", "MUR": "Mauritian Rupee", "MVR": "Maldivian Rufiyaa", "MWK": "Malawian Kwacha", "MZN": "Mozambican Metical", "NAD": "Namibian Dollar", "NGN": "Nigerian Naira", "NIO": "Nicaraguan Cordoba", "NPR": "Nepalese Rupee", "OMR": "Omani Rial", "PAB": "Panamanian Balboa", "PEN": "Peruvian Sol", "PGK": "Papua New Guinean Kina", "PKR": "Pakistani Rupee", "PYG": "Paraguayan Guarani", "QAR": "Qatari Rial", "RSD": "Serbian Dinar", "RUB": "Russian Ruble", "RWF": "Rwandan Franc", "SAR": "Saudi Riyal", "SBD": "Solomon Islands Dollar", "SCR": "Seychellois Rupee", "SDG": "Sudanese Pound", "SHP": "Saint Helena Pound", "SLL": "Sierra Leonean Leone", "SOS": "Somali Shilling", "SRD": "Surinamese Dollar", "STN": "Sao Tome Dobra", "SVC": "Salvadoran Colon", "SYP": "Syrian Pound", "SZL": "Swazi Lilangeni", "TJS": "Tajikistani Somoni", "TMT": "Turkmenistani Manat", "TND": "Tunisian Dinar", "TOP": "Tongan Paanga", "TTD": "Trinidad Dollar", "TWD": "New Taiwan Dollar", "TZS": "Tanzanian Shilling", "UAH": "Ukrainian Hryvnia", "UGX": "Ugandan Shilling", "UYU": "Uruguayan Peso", "UZS": "Uzbekistan Som", "VES": "Venezuelan Bolivar", "VND": "Vietnamese Dong", "VUV": "Vanuatu Vatu", "WST": "Samoan Tala", "XAF": "CFA Franc BEAC", "XCD": "East Caribbean Dollar", "XOF": "CFA Franc BCEAO", "XPF": "CFP Franc", "YER": "Yemeni Rial", "ZMW": "Zambian Kwacha", "ZWL": "Zimbabwean Dollar"};
var TIER1_CODES  = ["AUD", "BGN", "BRL", "CAD", "CHF", "CNY", "CZK", "DKK", "EUR", "GBP", "HKD", "HUF", "IDR", "ILS", "INR", "ISK", "JPY", "KRW", "MXN", "MYR", "NOK", "NZD", "PHP", "PLN", "RON", "SEK", "SGD", "THB", "TRY", "USD", "ZAR"];
var W            = "fx_eur_usd";
var API          = "https://api.frankfurter.dev/v2";

// ---------------------------------------------------------------------------
//  State
// ---------------------------------------------------------------------------
// RATES: currency code -> rate vs EUR (EUR always = 1.0)
// Cross-rate: A/B = RATES[B] / RATES[A]
var RATES      = {};
// HIST: currency code -> array of daily rates vs EUR, aligned to DATES
var HIST       = {};
// DATES: sorted array of "YYYY-MM-DD" strings for history
var DATES      = [];
var histReady  = false;
var chartBuilt = false;
var fxChart    = null;
var per        = 9999;
var _rawDates  = [];
var chartOpenPending = false;

// ---------------------------------------------------------------------------
//  Helpers
// ---------------------------------------------------------------------------
function $el(id) { return document.getElementById(W + "_" + id); }
function isTier1(c) { return !!TIER1[c]; }

function fmt(n) {
  if (n == null || isNaN(n)) return "—";
  if (n >= 10000) return n.toLocaleString("en-US", {maximumFractionDigits:2});
  if (n >= 100)   return n.toFixed(2);
  if (n >= 1)     return n.toFixed(4);
  return n.toFixed(6);
}

function setOpt(s, v) {
  var el = $el(s);
  for (var i = 0; i < el.options.length; i++)
    if (el.options[i].value === v) { el.selectedIndex = i; return; }
}

function show(id, on) {
  var el = $el(id);
  if (el) el.style.display = on ? "block" : "none";
}

function xRate(a, b) {
  if (RATES[a] == null || RATES[b] == null) return null;
  return RATES[b] / RATES[a];
}

// ---------------------------------------------------------------------------
//  Display
// ---------------------------------------------------------------------------
function updateDisplay() {
  var f    = $el("from").value;
  var t    = $el("to").value;
  var amt  = parseFloat($el("fromv").value) || 1;
  var rate = xRate(f, t);
  var rvalEl = $el("rval");

  if (rate == null) {
    rvalEl.textContent = "—";
    $el("rmeta").textContent = "Rate unavailable";
    return;
  }

  rvalEl.classList.remove("loading-pulse");
  var result = amt * rate;
  var lbl = fmt(amt) + " " + f + " =";
  if ($el("rlbl"))     $el("rlbl").textContent     = lbl;
  if ($el("rlbl_mob")) $el("rlbl_mob").textContent = lbl;
  rvalEl.textContent       = fmt(result);
  $el("rmeta").textContent = t + "  ·  1 " + f + " = " + fmt(rate) + " " + t;
  $el("tov").value         = result.toFixed(6);
}

// ---------------------------------------------------------------------------
//  Frankfurter v2 response parsing
//
//  v2 /rates always returns a JSON ARRAY of objects:
//    [ { "date": "2024-01-15", "base": "EUR", "quote": "USD", "rate": 1.089 }, ... ]
//
//  For latest rates (no date range): one object per quote currency.
//  For time series (from= supplied): one object per date+quote combination.
// ---------------------------------------------------------------------------

// Parse latest-rates array -> populate RATES (all vs EUR base)
function parseLatestRates(arr) {
  RATES["EUR"] = 1.0;
  for (var i = 0; i < arr.length; i++) {
    var row = arr[i];
    RATES[row.quote] = row.rate;
  }
}

// Parse time-series array -> populate HIST and DATES
// Input: flat array of { date, base:"EUR", quote, rate }
// Output: DATES = sorted unique dates; HIST[currency] = aligned rate array
function parseHistorySeries(arr) {
  // Step 1: collect unique sorted dates and build a date->index map
  var dateSet = {};
  for (var i = 0; i < arr.length; i++) dateSet[arr[i].date] = true;
  var sortedDates = Object.keys(dateSet).sort();
  var dateIdx = {};
  for (var j = 0; j < sortedDates.length; j++) dateIdx[sortedDates[j]] = j;

  var n = sortedDates.length;

  // Step 2: pre-fill HIST with null arrays for all Tier1 currencies
  var hist = {};
  for (var k = 0; k < TIER1_CODES.length; k++) {
    hist[TIER1_CODES[k]] = new Array(n).fill(null);
  }
  // EUR is always 1.0 vs itself
  hist["EUR"] = new Array(n).fill(1.0);

  // Step 3: fill in rates from the flat array
  for (var m = 0; m < arr.length; m++) {
    var row = arr[m];
    if (hist[row.quote] !== undefined) {
      hist[row.quote][dateIdx[row.date]] = row.rate;
    }
  }

  DATES = sortedDates;
  HIST  = hist;
}

// ---------------------------------------------------------------------------
//  STAGE 1 — fetch rates for the two default currencies immediately
//  Fast: only 1-2 quotes requested so the converter lights up quickly.
// ---------------------------------------------------------------------------
function fetchDefaultRates() {
  // Always need rates vs EUR. If a currency IS EUR, it's already 1.0.
  var needed = [DEFAULT_FROM, DEFAULT_TO].filter(function(c) { return c !== "EUR"; });
  var qs = needed.length ? "?base=EUR&quotes=" + needed.join(",") : "?base=EUR&quotes=USD";

  fetch(API + "/rates" + qs)
    .then(function(r) { return r.json(); })
    .then(function(arr) {
      parseLatestRates(arr);
      updateDisplay();
      // Kick off background stages
      fetchHistory();
      fetchAllRates();
    })
    .catch(function(e) {
      $el("rval").classList.remove("loading-pulse");
      $el("rval").textContent  = "Error";
      $el("rmeta").textContent = "Could not load rates";
      console.error("[FX] Stage 1 error:", e);
    });
}

// ---------------------------------------------------------------------------
//  STAGE 2 — fetch full 5yr daily history for all Tier1 currencies
//  Runs in background; chart becomes available once this resolves.
// ---------------------------------------------------------------------------
function fetchHistory() {
  var from5y = new Date();
  from5y.setFullYear(from5y.getFullYear() - 5);
  var fromStr = from5y.toISOString().slice(0, 10);

  // Exclude EUR from quotes — it's the base, already handled as 1.0
  var quoteCodes = TIER1_CODES.filter(function(c) { return c !== "EUR"; }).join(",");
  var url = API + "/rates?from=" + fromStr + "&base=EUR&quotes=" + quoteCodes;

  fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(arr) {
      parseHistorySeries(arr);
      histReady = true;

      // If user already clicked chart toggle before data arrived, render now
      if (chartOpenPending) {
        chartOpenPending = false;
        var f = $el("from").value, t = $el("to").value;
        if (isTier1(f) && isTier1(t)) {
          show("chartNoData", false);
          show("chartArea", true);
          if (!chartBuilt) { buildChart(); chartBuilt = true; }
          else refreshChart();
        } else {
          updateChartSection();
        }
      }
    })
    .catch(function(e) {
      console.error("[FX] Stage 2 history error:", e);
      if (chartOpenPending) {
        chartOpenPending = false;
        show("chartNoData", true);
        show("chartArea", false);
        $el("noDataMsg").textContent = "History unavailable right now.";
      }
    });
}

// ---------------------------------------------------------------------------
//  STAGE 3 — fetch ALL currency rates for full dropdown
//  Runs in background; Tier2 dropdown populates once this resolves.
// ---------------------------------------------------------------------------
function fetchAllRates() {
  fetch(API + "/rates?base=EUR")
    .then(function(r) { return r.json(); })
    .then(function(arr) {
      parseLatestRates(arr);  // merges into RATES, won't overwrite existing

      // Populate Tier2 optgroup now that we know which codes have rates
      var t2grp = document.getElementById(W + "_t2grp");
      if (t2grp) {
        t2grp.label = "Current rate only";
        var html = "";
        var t2keys = Object.keys(TIER2).sort();
        for (var i = 0; i < t2keys.length; i++) {
          var c = t2keys[i];
          if (RATES[c] != null) {
            html += '<option value="' + c + '">' + c + ' — ' + TIER2[c] + '</option>';
          }
        }
        t2grp.innerHTML = html;
      }
    })
    .catch(function(e) {
      console.error("[FX] Stage 3 all-rates error:", e);
      var t2grp = document.getElementById(W + "_t2grp");
      if (t2grp) t2grp.label = "More currencies (unavailable)";
    });
}

// ---------------------------------------------------------------------------
//  Converter interactions
// ---------------------------------------------------------------------------
window[W + "_fwd"] = function() {
  var f = $el("from").value, t = $el("to").value;
  var amt = parseFloat($el("fromv").value);
  var rate = xRate(f, t);
  if (!rate || isNaN(amt)) return;
  $el("tov").value = (amt * rate).toFixed(6);
  updateDisplay();
};

window[W + "_rev"] = function() {
  var f = $el("from").value, t = $el("to").value;
  var amt = parseFloat($el("tov").value);
  var rate = xRate(t, f);
  if (!rate || isNaN(amt)) return;
  $el("fromv").value = (amt * rate).toFixed(6);
  updateDisplay();
};

window[W + "_go"] = function() {
  window[W + "_fwd"]();
  updateChartSection();
  if (chartBuilt) refreshChart();
};

window[W + "_swap"] = function() {
  var f = $el("from").value, t = $el("to").value;
  setOpt("from", t); setOpt("to", f);
  window[W + "_go"]();
};

// ---------------------------------------------------------------------------
//  Chart
// ---------------------------------------------------------------------------
function updateChartSection() {
  var f = $el("from").value, t = $el("to").value;
  if (isTier1(f) && isTier1(t)) {
    show("chartNoData", false); show("chartArea", true);
    $el("ctitle").textContent = f + "/" + t;
  } else {
    show("chartNoData", true); show("chartArea", false);
    var missing = [f, t].filter(function(c) { return !isTier1(c); }).join(", ");
    $el("noDataMsg").textContent = "Historical data not available for " + missing + ".";
  }
}

function series() {
  var f = $el("from").value, t = $el("to").value;
  if (!DATES.length) return { data: [], n: 0 };

  var n;
  if (per >= 9999) {
    n = DATES.length;
  } else {
    var lastDate = new Date(DATES[DATES.length - 1]);
    var cutoff   = lastDate.getTime() - per * 86400000;
    n = 0;
    for (var k = DATES.length - 1; k >= 0; k--) {
      if (new Date(DATES[k]).getTime() >= cutoff) n++;
      else break;
    }
    if (n === 0) n = 1;
  }

  var fH = HIST[f], tH = HIST[t];
  if (!fH || !tH) return { data: [], n: 0 };

  var ds   = DATES.slice(-n);
  var fs   = fH.slice(-n);
  var ts   = tH.slice(-n);
  var data = fs.map(function(v, i) {
    return (v != null && ts[i] != null) ? +((ts[i] / v).toFixed(5)) : null;
  });

  // Tick label logic — one label type per period, no mixing, no duplicates
  var tMap = {}, lastYr = -1, lastWeek = -1, seenLabel = {};
  var EPOCH = Date.UTC(1970, 0, 1);

  for (var i = 0; i < n; i++) {
    var dt   = new Date(ds[i]);
    var yr   = dt.getUTCFullYear();
    var mo   = dt.getUTCMonth();
    var dom  = dt.getUTCDate();
    var day  = dt.getUTCDay();
    var ms   = dt.toLocaleString("en-US", { month: "short", timeZone: "UTC" });
    var absW = Math.floor((dt.getTime() - EPOCH) / 604800000);

    if (per >= 9999) {
      if (yr !== lastYr) { tMap[i] = String(yr); lastYr = yr; }
    } else if (per >= 365) {
      if (mo % 2 === 0 && !seenLabel[ms]) { tMap[i] = ms; seenLabel[ms] = true; }
    } else if (per >= 90) {
      if (!seenLabel[ms]) { tMap[i] = ms; seenLabel[ms] = true; }
    } else {
      if (day === 1 && absW !== lastWeek) { tMap[i] = ms + " " + dom; lastWeek = absW; }
    }
  }

  var labels = [];
  for (var j = 0; j < n; j++) labels.push(tMap[j] !== undefined ? tMap[j] : "");

  _rawDates = ds;
  return { data: data, labels: labels, n: n };
}

function buildChart() {
  var ctx = document.getElementById(W + "_c").getContext("2d");
  var s = series();
  if (!s.n) return;
  fxChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: s.labels,
      datasets: [{
        data: s.data,
        borderColor: "#52B788", borderWidth: 1.5,
        fill: true,
        backgroundColor: function(c) {
          var g = c.chart.ctx.createLinearGradient(0, 0, 0, 150);
          g.addColorStop(0, "rgba(82,183,136,0.15)");
          g.addColorStop(1, "rgba(82,183,136,0)");
          return g;
        },
        pointRadius: 0, pointHoverRadius: 3,
        pointHoverBackgroundColor: "#52B788",
        tension: 0.3, spanGaps: true
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1E4034", titleColor: "rgba(201,212,197,0.9)",
          bodyColor: "#fff", titleFont: { size: 10 },
          bodyFont: { size: 12, weight: "500" },
          padding: 9, displayColors: false,
          callbacks: {
            title: function(items) { return _rawDates[items[0].dataIndex] || ""; },
            label: function(item) {
              var f = $el("from").value, t = $el("to").value;
              return item.raw == null ? "—" : " 1 " + f + " = " + item.raw + " " + t;
            }
          }
        }
      },
      scales: {
        x: {
          type: "category",
          grid: { display: false }, border: { display: false },
          ticks: {
            color: "#8C8C8C", font: { size: 9 },
            maxRotation: 0, autoSkip: false
          }
        },
        y: {
          position: "right", grid: { color: "#F2F2F2" },
          border: { display: false },
          ticks: { color: "#8C8C8C", font: { size: 9 }, maxTicksLimit: 4 }
        }
      }
    }
  });
}

function refreshChart() {
  if (!fxChart) return;
  var s = series();
  if (!s.n) return;
  fxChart.data.labels   = s.labels;
  fxChart.data.datasets[0].data = s.data;
  fxChart.update();
}

window[W + "_toggleChart"] = function() {
  var body   = $el("cbody");
  var chev   = $el("chev");
  var isOpen = body.style.display === "block";
  body.style.display   = isOpen ? "none" : "block";
  chev.style.transform = isOpen ? "" : "rotate(180deg)";

  if (!isOpen) {
    var f = $el("from").value, t = $el("to").value;
    if (!isTier1(f) || !isTier1(t)) { updateChartSection(); return; }

    if (!histReady) {
      // History still loading — show placeholder, render when it arrives
      chartOpenPending = true;
      show("chartNoData", true);
      show("chartArea", false);
      $el("noDataMsg").textContent = "Loading history…";
      return;
    }
    updateChartSection();
    if (!chartBuilt) { buildChart(); chartBuilt = true; }
    else refreshChart();
  }
};

window[W + "_per"] = function(days, btn) {
  per = days;
  var btns = document.querySelectorAll("#fx_eur_usd .fx-pbtn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("on");
  btn.classList.add("on");
  if (histReady) refreshChart();
};

// ---------------------------------------------------------------------------
//  Boot
// ---------------------------------------------------------------------------
setOpt("from", DEFAULT_FROM);
setOpt("to",   DEFAULT_TO);
fetchDefaultRates();  // Stage 1 → on success kicks off Stage 2 + 3

})();
</script>
</body></html>
