(function() {
var DEFAULT_FROM = "EUR";
var DEFAULT_TO   = "USD";
var TIER1        = {"AUD": "Australian Dollar", "BGN": "Bulgarian Lev", "BRL": "Brazilian Real", "CAD": "Canadian Dollar", "CHF": "Swiss Franc", "CNY": "Chinese Yuan", "CZK": "Czech Koruna", "DKK": "Danish Krone", "EUR": "Euro", "GBP": "British Pound", "HKD": "Hong Kong Dollar", "HUF": "Hungarian Forint", "IDR": "Indonesian Rupiah", "ILS": "Israeli Shekel", "INR": "Indian Rupee", "ISK": "Icelandic Krona", "JPY": "Japanese Yen", "KRW": "South Korean Won", "MXN": "Mexican Peso", "MYR": "Malaysian Ringgit", "NOK": "Norwegian Krone", "NZD": "New Zealand Dollar", "PHP": "Philippine Peso", "PLN": "Polish Zloty", "RON": "Romanian Leu", "SEK": "Swedish Krone", "SGD": "Singapore Dollar", "THB": "Thai Baht", "TRY": "Turkish Lira", "USD": "US Dollar", "ZAR": "South African Rand"};
var TIER2        = {"AED": "UAE Dirham", "AFN": "Afghan Afghani", "ALL": "Albanian Lek", "AMD": "Armenian Dram", "ANG": "Netherlands Antillean Guilder", "AOA": "Angolan Kwanza", "ARS": "Argentine Peso", "AWG": "Aruban Florin", "AZN": "Azerbaijani Manat", "BAM": "Bosnia-Herzegovina Mark", "BBD": "Barbadian Dollar", "BDT": "Bangladeshi Taka", "BHD": "Bahraini Dinar", "BIF": "Burundian Franc", "BMD": "Bermudian Dollar", "BND": "Brunei Dollar", "BOB": "Bolivian Boliviano", "BSD": "Bahamian Dollar", "BTN": "Bhutanese Ngultrum", "BWP": "Botswanan Pula", "BYN": "Belarusian Ruble", "BZD": "Belize Dollar", "CDF": "Congolese Franc", "CLP": "Chilean Peso", "COP": "Colombian Peso", "CRC": "Costa Rican Colon", "CUP": "Cuban Peso", "CVE": "Cape Verdean Escudo", "DJF": "Djiboutian Franc", "DOP": "Dominican Peso", "DZD": "Algerian Dinar", "EGP": "Egyptian Pound", "ERN": "Eritrean Nakfa", "ETB": "Ethiopian Birr", "FJD": "Fijian Dollar", "FKP": "Falkland Islands Pound", "GEL": "Georgian Lari", "GHS": "Ghanaian Cedi", "GIP": "Gibraltar Pound", "GMD": "Gambian Dalasi", "GNF": "Guinean Franc", "GTQ": "Guatemalan Quetzal", "GYD": "Guyanaese Dollar", "HNL": "Honduran Lempira", "HTG": "Haitian Gourde", "IQD": "Iraqi Dinar", "IRR": "Iranian Rial", "JMD": "Jamaican Dollar", "JOD": "Jordanian Dinar", "KES": "Kenyan Shilling", "KGS": "Kyrgystani Som", "KHR": "Cambodian Riel", "KMF": "Comorian Franc", "KPW": "North Korean Won", "KWD": "Kuwaiti Dinar", "KYD": "Cayman Islands Dollar", "KZT": "Kazakhstani Tenge", "LAK": "Laotian Kip", "LBP": "Lebanese Pound", "LKR": "Sri Lankan Rupee", "LRD": "Liberian Dollar", "LSL": "Lesotho Loti", "LYD": "Libyan Dinar", "MAD": "Moroccan Dirham", "MDL": "Moldovan Leu", "MGA": "Malagasy Ariary", "MKD": "Macedonian Denar", "MMK": "Myanma Kyat", "MNT": "Mongolian Tugrik", "MOP": "Macanese Pataca", "MRU": "Mauritanian Ouguiya", "MUR": "Mauritian Rupee", "MVR": "Maldivian Rufiyaa", "MWK": "Malawian Kwacha", "MZN": "Mozambican Metical", "NAD": "Namibian Dollar", "NGN": "Nigerian Naira", "NIO": "Nicaraguan Cordoba", "NPR": "Nepalese Rupee", "OMR": "Omani Rial", "PAB": "Panamanian Balboa", "PEN": "Peruvian Sol", "PGK": "Papua New Guinean Kina", "PKR": "Pakistani Rupee", "PYG": "Paraguayan Guarani", "QAR": "Qatari Rial", "RSD": "Serbian Dinar", "RUB": "Russian Ruble", "RWF": "Rwandan Franc", "SAR": "Saudi Riyal", "SBD": "Solomon Islands Dollar", "SCR": "Seychellois Rupee", "SDG": "Sudanese Pound", "SHP": "Saint Helena Pound", "SLL": "Sierra Leonean Leone", "SOS": "Somali Shilling", "SRD": "Surinamese Dollar", "STN": "Sao Tome Dobra", "SVC": "Salvadoran Colon", "SYP": "Syrian Pound", "SZL": "Swazi Lilangeni", "TJS": "Tajikistani Somoni", "TMT": "Turkmenistani Manat", "TND": "Tunisian Dinar", "TOP": "Tongan Paanga", "TTD": "Trinidad Dollar", "TWD": "New Taiwan Dollar", "TZS": "Tanzanian Shilling", "UAH": "Ukrainian Hryvnia", "UGX": "Ugandan Shilling", "UYU": "Uruguayan Peso", "UZS": "Uzbekistan Som", "VES": "Venezuelan Bolivar", "VND": "Vietnamese Dong", "VUV": "Vanuatu Vatu", "WST": "Samoan Tala", "XAF": "CFA Franc BEAC", "XCD": "East Caribbean Dollar", "XOF": "CFA Franc BCEAO", "XPF": "CFP Franc", "YER": "Yemeni Rial", "ZMW": "Zambian Kwacha", "ZWL": "Zimbabwean Dollar"};
var W            = "fx_eur_usd";
var API          = "https://api.frankfurter.dev/v2";

var _5Y_FROM = (function() {
  var d = new Date(); d.setFullYear(d.getFullYear() - 5);
  return d.toISOString().slice(0, 10);
})();

// ---- State ----
var RATES      = {};
var HIST_CACHE = { "EUR": null };  // null = synthetic 1.0 array, filled on demand
var HIST_DATES = [];
var histFetching = {};
var chartBuilt = false;
var fxChart    = null;
var per        = 9999;
var _rawDates  = [];

// ---- Helpers ----
function $el(id) { return document.getElementById(W + "_" + id); }
function isTier1(c) { return !!TIER1[c]; }
function chartPanelOpen() { return $el("cbody").style.display === "block"; }

function fmt(n) {
  if (n == null || isNaN(n)) return "—";
  if (n >= 10000) return n.toLocaleString("en-US", {maximumFractionDigits:2});
  if (n >= 100)   return n.toFixed(2);
  if (n >= 1)     return n.toFixed(4);
  return n.toFixed(6);
}

function show(id, on) { var el=$el(id); if(el) el.style.display=on?"block":"none"; }

function xRate(a, b) {
  if (RATES[a]==null || RATES[b]==null) return null;
  return RATES[b] / RATES[a];
}

// ---- v2 parsers ----
// v2 always returns: [ { date, base, quote, rate }, ... ]

function parseLatestInto(arr) {
  RATES["EUR"] = 1.0;
  for (var i=0; i<arr.length; i++) RATES[arr[i].quote] = arr[i].rate;
}

function parseHistoryInto(arr) {
  if (!arr.length) return;

  // Collect unique dates from this response
  var newDateSet = {};
  for (var i=0; i<arr.length; i++) newDateSet[arr[i].date] = true;

  // Merge with existing HIST_DATES
  var mergedSet = {};
  for (var j=0; j<HIST_DATES.length; j++) mergedSet[HIST_DATES[j]] = true;
  for (var d in newDateSet) mergedSet[d] = true;
  var mergedDates = Object.keys(mergedSet).sort();
  var n = mergedDates.length;

  var dateIdx = {};
  for (var m=0; m<n; m++) dateIdx[mergedDates[m]] = m;

  // Re-align existing cache arrays to the new axis if dates were added
  if (n !== HIST_DATES.length) {
    for (var code in HIST_CACHE) {
      if (HIST_CACHE[code] === null) continue;
      var old = HIST_CACHE[code];
      var realigned = new Array(n).fill(null);
      for (var p=0; p<HIST_DATES.length; p++) {
        var np = dateIdx[HIST_DATES[p]];
        if (np !== undefined) realigned[np] = old[p];
      }
      HIST_CACHE[code] = realigned;
    }
    // Invalidate EUR sentinel so it gets rematerialised at correct length
    if (HIST_CACHE["EUR"] !== null) HIST_CACHE["EUR"] = null;
  }

  HIST_DATES = mergedDates;

  // Initialise arrays for any new currencies seen in this response
  for (var i=0; i<arr.length; i++) {
    var q = arr[i].quote;
    if (HIST_CACHE[q] === undefined) HIST_CACHE[q] = new Array(n).fill(null);
  }

  // Fill values
  for (var r=0; r<arr.length; r++) {
    var row = arr[r];
    var idx = dateIdx[row.date];
    if (idx !== undefined && HIST_CACHE[row.quote] !== undefined)
      HIST_CACHE[row.quote][idx] = row.rate;
  }
}

function getHist(code) {
  if (code === "EUR") {
    if (!HIST_DATES.length) return null;
    if (HIST_CACHE["EUR"] === null)
      HIST_CACHE["EUR"] = new Array(HIST_DATES.length).fill(1.0);
    return HIST_CACHE["EUR"];
  }
  return HIST_CACHE[code] || null;
}

// ---- History fetching — lazy, per-currency, deduplicated ----

function ensureHistory(codes) {
  var needed = codes.filter(function(c) {
    return c !== "EUR" && HIST_CACHE[c] === undefined && !histFetching[c];
  });

  var inFlight = codes.filter(function(c) { return !!histFetching[c]; })
                      .map(function(c) { return histFetching[c]; });

  if (!needed.length) {
    return inFlight.length ? Promise.all(inFlight) : Promise.resolve();
  }

  var p = fetch(API + "/rates?from=" + _5Y_FROM + "&base=EUR&quotes=" + needed.join(","))
    .then(function(r) { return r.json(); })
    .then(function(arr) {
      parseHistoryInto(arr);
      for (var i=0; i<needed.length; i++) delete histFetching[needed[i]];
    })
    .catch(function(e) {
      console.error("[FX] history fetch error:", e);
      for (var i=0; i<needed.length; i++) {
        if (HIST_CACHE[needed[i]] === undefined) HIST_CACHE[needed[i]] = [];
        delete histFetching[needed[i]];
      }
    });

  for (var i=0; i<needed.length; i++) histFetching[needed[i]] = p;
  return inFlight.length ? Promise.all([p].concat(inFlight)) : p;
}

// ---- Chart render helpers ----
// Single entry point: call this whenever data may have changed or pair changed.
// It decides whether to build, refresh, or do nothing based on state.
function tryRenderChart() {
  var f = $el("from").value, t = $el("to").value;

  if (!isTier1(f) || !isTier1(t)) {
    show("chartNoData", true); show("chartArea", false);
    var missing = [f,t].filter(function(c){return !isTier1(c);}).join(", ");
    $el("noDataMsg").textContent = "Historical data not available for " + missing + ".";
    return;
  }

  var fH = getHist(f), tH = getHist(t);
  if (!fH || !tH || !fH.length || !tH.length) {
    // Data not ready yet — leave any existing loading message in place
    return;
  }

  show("chartNoData", false); show("chartArea", true);
  $el("ctitle").textContent = f + "/" + t;

  if (!chartBuilt) {
    buildChart(); chartBuilt = true;
  } else {
    refreshChart();
  }
}

// ---- Stage 1: latest rate for default pair ----
function fetchDefaultRates() {
  var needed = [DEFAULT_FROM, DEFAULT_TO].filter(function(c){ return c!=="EUR"; });
  var qs = needed.length ? "?base=EUR&quotes="+needed.join(",") : "?base=EUR&quotes=USD";
  fetch(API+"/rates"+qs)
    .then(function(r){ return r.json(); })
    .then(function(arr) {
      parseLatestInto(arr);
      updateDisplay();
      fetchPairHistory(DEFAULT_FROM, DEFAULT_TO);  // Stage 2
      fetchAllRates();                              // Stage 3
    })
    .catch(function(e) {
      $el("rval").classList.remove("loading-pulse");
      $el("rval").textContent  = "Error";
      $el("rmeta").textContent = "Could not load rates";
      console.error("[FX] Stage 1 error:", e);
    });
}

// ---- Stage 2: history for a specific pair ----
function fetchPairHistory(f, t) {
  var codes = [f,t].filter(function(c){ return c!=="EUR"; });
  if (!codes.length) { onHistoryReady(f, t); return; }
  ensureHistory(codes).then(function() { onHistoryReady(f, t); });
}

function onHistoryReady(f, t) {
  // Guard: ignore if user has changed currency since this fetch was kicked off
  if ($el("from").value !== f || $el("to").value !== t) return;
  if (chartPanelOpen()) tryRenderChart();
}

// ---- Stage 3: all current rates (background) ----
function fetchAllRates() {
  fetch(API+"/rates?base=EUR")
    .then(function(r){ return r.json(); })
    .then(function(arr) {
      parseLatestInto(arr);
      // Populate both Tier2 optgroups (From and To dropdowns)
      ["t2grp","t2grp_to"].forEach(function(grpId) {
        var grp = document.getElementById(W+"_"+grpId);
        if (!grp) return;
        grp.label = "Current rate only";
        var html = "";
        Object.keys(TIER2).sort().forEach(function(c) {
          if (RATES[c] != null)
            html += '<option value="'+c+'">'+c+' — '+TIER2[c]+'</option>';
        });
        grp.innerHTML = html;
      });
    })
    .catch(function(e){ console.error("[FX] Stage 3 error:", e); });
}

// ---- Converter display ----
function updateDisplay() {
  var f=$el("from").value, t=$el("to").value;
  var amt=parseFloat($el("fromv").value)||1;
  var rate=xRate(f,t);
  var rv=$el("rval");
  if (rate==null) {
    rv.textContent="—";
    $el("rmeta").textContent=(RATES[f]==null||RATES[t]==null)?"Loading…":"Rate unavailable";
    return;
  }
  rv.classList.remove("loading-pulse");
  var result=amt*rate;
  var lbl=fmt(amt)+" "+f+" =";
  if($el("rlbl"))     $el("rlbl").textContent=lbl;
  if($el("rlbl_mob")) $el("rlbl_mob").textContent=lbl;
  rv.textContent=$el("rmeta").textContent="";
  rv.textContent=fmt(result);
  $el("rmeta").textContent=t+"  ·  1 "+f+" = "+fmt(rate)+" "+t;
  $el("tov").value=result.toFixed(6);
}

// ---- Interactions ----
window[W+"_fwd"] = function() {
  var amt=parseFloat($el("fromv").value), rate=xRate($el("from").value,$el("to").value);
  if(!rate||isNaN(amt)) return;
  $el("tov").value=(amt*rate).toFixed(6); updateDisplay();
};

window[W+"_rev"] = function() {
  var amt=parseFloat($el("tov").value), rate=xRate($el("to").value,$el("from").value);
  if(!rate||isNaN(amt)) return;
  $el("fromv").value=(amt*rate).toFixed(6); updateDisplay();
};

window[W+"_go"] = function() {
  var f=$el("from").value, t=$el("to").value;
  $el("ctitle").textContent=f+"/"+t;
  updateDisplay();

  if (!isTier1(f) || !isTier1(t)) {
    show("chartNoData",true); show("chartArea",false);
    var missing=[f,t].filter(function(c){return !isTier1(c);}).join(", ");
    $el("noDataMsg").textContent="Historical data not available for "+missing+".";
    return;
  }

  var fCached = (f==="EUR" || HIST_CACHE[f]!==undefined);
  var tCached = (t==="EUR" || HIST_CACHE[t]!==undefined);

  if (fCached && tCached) {
    if (chartPanelOpen()) tryRenderChart();
  } else {
    if (chartPanelOpen()) {
      show("chartNoData",true); show("chartArea",false);
      $el("noDataMsg").textContent="Loading history…";
    }
    fetchPairHistory(f, t);
  }
};

window[W+"_swap"] = function() {
  var f=$el("from").value, t=$el("to").value;
  // Swap selected index on both dropdowns
  var fromSel=$el("from"), toSel=$el("to");
  var fromVal=f, toVal=t;
  for(var i=0;i<fromSel.options.length;i++) if(fromSel.options[i].value===toVal){fromSel.selectedIndex=i;break;}
  for(var i=0;i<toSel.options.length;i++)   if(toSel.options[i].value===fromVal){toSel.selectedIndex=i;break;}
  window[W+"_go"]();
};

window[W+"_toggleChart"] = function() {
  var body=$el("cbody"), chev=$el("chev");
  var isOpen=body.style.display==="block";
  body.style.display  =isOpen?"none":"block";
  chev.style.transform=isOpen?"":"rotate(180deg)";
  if (!isOpen) {
    var f=$el("from").value, t=$el("to").value;
    if (!isTier1(f)||!isTier1(t)) {
      show("chartNoData",true); show("chartArea",false);
      var missing=[f,t].filter(function(c){return !isTier1(c);}).join(", ");
      $el("noDataMsg").textContent="Historical data not available for "+missing+".";
      return;
    }
    var fCached=(f==="EUR"||HIST_CACHE[f]!==undefined);
    var tCached=(t==="EUR"||HIST_CACHE[t]!==undefined);
    if (fCached && tCached) {
      tryRenderChart();
    } else {
      show("chartNoData",true); show("chartArea",false);
      $el("noDataMsg").textContent="Loading history…";
      fetchPairHistory(f, t);
    }
  }
};

window[W+"_per"] = function(days, btn) {
  per=days;
  var btns=document.querySelectorAll("#fx_eur_usd .fx-pbtn");
  for(var i=0;i<btns.length;i++) btns[i].classList.remove("on");
  btn.classList.add("on");
  if(chartBuilt) refreshChart();
};

// ---- Chart ----
function series() {
  var f=$el("from").value, t=$el("to").value;
  var fH=getHist(f), tH=getHist(t);
  if(!fH||!tH||!HIST_DATES.length) return {data:[],n:0};

  var n;
  if (per>=9999) {
    n=HIST_DATES.length;
  } else {
    var last=new Date(HIST_DATES[HIST_DATES.length-1]);
    var cutoff=last.getTime()-per*86400000;
    n=0;
    for(var k=HIST_DATES.length-1;k>=0;k--) {
      if(new Date(HIST_DATES[k]).getTime()>=cutoff) n++; else break;
    }
    if(n===0) n=1;
  }

  var ds=HIST_DATES.slice(-n), fs=fH.slice(-n), ts=tH.slice(-n);
  var data=fs.map(function(v,i){
    return (v!=null&&ts[i]!=null)?+((ts[i]/v).toFixed(5)):null;
  });

  var tMap={},lastYr=-1,lastWeek=-1,seenLabel={};
  var EPOCH=Date.UTC(1970,0,1);
  for(var i=0;i<n;i++) {
    var dt=new Date(ds[i]);
    var yr=dt.getUTCFullYear(),mo=dt.getUTCMonth(),dom=dt.getUTCDate(),day=dt.getUTCDay();
    var ms=dt.toLocaleString("en-US",{month:"short",timeZone:"UTC"});
    var absW=Math.floor((dt.getTime()-EPOCH)/604800000);
    if(per>=9999)      { if(yr!==lastYr)                      {tMap[i]=String(yr);lastYr=yr;} }
    else if(per>=365)  { if(mo%2===0&&!seenLabel[ms])         {tMap[i]=ms;seenLabel[ms]=true;} }
    else if(per>=90)   { if(!seenLabel[ms])                   {tMap[i]=ms;seenLabel[ms]=true;} }
    else               { if(day===1&&absW!==lastWeek)          {tMap[i]=ms+" "+dom;lastWeek=absW;} }
  }
  var labels=[];
  for(var j=0;j<n;j++) labels.push(tMap[j]!==undefined?tMap[j]:"");
  _rawDates=ds;
  return {data:data,labels:labels,n:n};
}

function buildChart() {
  var ctx=document.getElementById(W+"_c").getContext("2d");
  var s=series(); if(!s.n) return;
  fxChart=new Chart(ctx,{
    type:"line",
    data:{
      labels:s.labels,
      datasets:[{
        data:s.data, borderColor:"#52B788", borderWidth:1.5, fill:true,
        backgroundColor:function(c){
          var g=c.chart.ctx.createLinearGradient(0,0,0,150);
          g.addColorStop(0,"rgba(82,183,136,0.15)");
          g.addColorStop(1,"rgba(82,183,136,0)");
          return g;
        },
        pointRadius:0, pointHoverRadius:3,
        pointHoverBackgroundColor:"#52B788",
        tension:0.3, spanGaps:true
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      interaction:{mode:"index",intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:"#1E4034",titleColor:"rgba(201,212,197,0.9)",
          bodyColor:"#fff",titleFont:{size:10},bodyFont:{size:12,weight:"500"},
          padding:9,displayColors:false,
          callbacks:{
            title:function(items){return _rawDates[items[0].dataIndex]||"";},
            label:function(item){
              var f=$el("from").value,t=$el("to").value;
              return item.raw==null?"—":" 1 "+f+" = "+item.raw+" "+t;
            }
          }
        }
      },
      scales:{
        x:{type:"category",grid:{display:false},border:{display:false},
            ticks:{color:"#8C8C8C",font:{size:9},maxRotation:0,autoSkip:false}},
        y:{position:"right",grid:{color:"#F2F2F2"},border:{display:false},
            ticks:{color:"#8C8C8C",font:{size:9},maxTicksLimit:4}}
      }
    }
  });
}

function refreshChart() {
  if(!fxChart) return;
  var s=series(); if(!s.n) return;
  fxChart.data.labels=s.labels;
  fxChart.data.datasets[0].data=s.data;
  fxChart.update();
}

// ---- Boot ----
fetchDefaultRates();

})();
</script>
</body></html>
