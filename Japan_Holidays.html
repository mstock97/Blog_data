<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Holiday Lookup</title>

<!-- ╔══════════════════════════════════╗
     ║  CONFIGURATION — EDIT HERE      ║
     ╚══════════════════════════════════╝
     DEFAULT_COUNTRY: any ISO 2-letter code
     e.g. "US"  "JP"  "GB"  "DE"  "AU"  "FR"  "SG"       -->

<script>var DEFAULT_COUNTRY = "JP";</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">

<style>
/* ── tokens ── */
:root {
  --forest:    #1E4034;
  --canopy:    #2D6A4F;
  --moss:      #52B788;
  --driftwood: #A8896A;
  --fog:       #C9D4C5;
  --ink:       #0F0F0F;
  --graphite:  #3D3D3D;
  --ash:       #8C8C8C;
  --cloud:     #EFEFEF;
  --paper:     #F7F5F0;
  --white:     #FFFFFF;
  --forest-06: #F4F7F6;
  --forest-10: #ECF0EF;
  --moss-15:   #E2F2EB;
  --drift-15:  #F3EBE2;

  --f-display:  'Bebas Neue','Arial Black','Impact',sans-serif;
  --f-body:     'DM Sans','Helvetica Neue',Arial,sans-serif;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--f-body);
  font-size: 13px;
  line-height: 1.5;
  color: var(--graphite);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
}

/* ── thin title bar ── */
.top-bar {
  background: var(--forest);
  padding: 8px 16px;
  display: flex;
  align-items: baseline;
  gap: 12px;
  border-bottom: 2px solid var(--canopy);
}

.top-title {
  font-family: var(--f-display);
  font-size: 18px;
  letter-spacing: 0.12em;
  color: var(--white);
  line-height: 1;
}

.top-meta {
  font-size: 11px;
  color: var(--fog);
  letter-spacing: 0.04em;
}

.top-badges {
  margin-left: auto;
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}

.badge {
  display: inline-block;
  padding: 2px 8px;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  border-radius: 2px;
  line-height: 1.6;
}
.badge-count   { background: var(--moss-15); color: var(--canopy); }
.badge-shifted { background: var(--drift-15); color: #6a4200; }

/* ── status strip ── */
.status {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 500;
}
.status.show { display: flex; }
.status.loading { background: var(--forest-10); color: var(--canopy); }
.status.error   { background: #FFF5EA; color: #7a3800; border-left: 3px solid #FF9500; }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  width: 12px; height: 12px; flex-shrink: 0;
  border: 2px solid rgba(45,106,79,.2);
  border-top-color: var(--canopy);
  border-radius: 50%;
  animation: spin .65s linear infinite;
}

/* ── year tabs ── */
.year-nav {
  display: none;
  padding: 8px 16px 0;
  gap: 6px;
  flex-wrap: wrap;
}
.year-nav.show { display: flex; }

.year-tab {
  padding: 2px 14px;
  font-family: var(--f-display);
  font-size: 13px;
  letter-spacing: 0.1em;
  color: var(--ash);
  background: none;
  border: 1px solid var(--cloud);
  border-radius: 2px;
  cursor: pointer;
  transition: all .12s;
}
.year-tab:hover { border-color: var(--canopy); color: var(--canopy); }
.year-tab.active { background: var(--forest); color: var(--white); border-color: var(--forest); }

/* ── legend ── */
.legend {
  display: none;
  padding: 6px 16px 2px;
  gap: 12px;
  flex-wrap: wrap;
}
.legend.show { display: flex; }

.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ash);
}
.leg-dot {
  width: 9px; height: 9px;
  border-radius: 50%; flex-shrink: 0;
}
.dot-a { background: var(--canopy); }
.dot-o { background: var(--driftwood); }

/* ── calendar ── */
.cal-wrap {
  padding: 8px 16px 4px;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}

@media (max-width: 680px) {
  .cal-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 360px) {
  .cal-grid { grid-template-columns: 1fr 1fr; }
}

.month-card {
  background: var(--white);
  border: 1px solid var(--cloud);
  border-radius: 2px;
  /* Do NOT set overflow:hidden — that clips tooltips */
}

.month-head {
  background: var(--forest);
  padding: 5px 8px 4px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-radius: 2px 2px 0 0;
}

.month-name {
  font-family: var(--f-display);
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--white);
  line-height: 1;
}

.month-hcount {
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--moss);
  line-height: 1;
}

.cal-wkdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  background: var(--forest-06);
  border-bottom: 1px solid var(--cloud);
}

.cal-wkday {
  text-align: center;
  padding: 3px 0;
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ash);
}

.cal-days {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  padding: 3px;
  gap: 1px;
  /* NO overflow:hidden here */
}

/* Square cell via padding trick */
.cal-day {
  position: relative;
  width: 100%;
  padding-top: 100%;
  border-radius: 50%;
  cursor: default;
}

.cal-day-in {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 400;
  color: var(--graphite);
  border-radius: 50%;
  line-height: 1;
}

.cal-day.empty .cal-day-in { color: transparent; }

.cal-day.is-a .cal-day-in {
  background: var(--canopy);
  color: var(--white);
  font-weight: 600;
}

.cal-day.is-o .cal-day-in {
  background: var(--driftwood);
  color: var(--white);
  font-weight: 600;
}

.cal-day.is-a.is-o .cal-day-in {
  background: linear-gradient(135deg, var(--canopy) 50%, var(--driftwood) 50%);
  color: var(--white);
  font-weight: 600;
}

.cal-day.has-tip {
  cursor: pointer;
  z-index: 1;
}
.cal-day.has-tip:hover .cal-day-in { filter: brightness(1.15); }

/* ── FIXED-POSITION TOOLTIP ── */
/* Rendered in <body>, positioned via JS on mouseenter */
#tooltip {
  display: none;
  position: fixed;
  z-index: 9999;
  background: var(--ink);
  color: var(--white);
  padding: 10px 12px;
  min-width: 165px;
  max-width: 205px;
  border-radius: 3px;
  box-shadow: 0 6px 22px rgba(0,0,0,.40);
  pointer-events: none;
  font-family: var(--f-body);
  font-size: 11px;
  line-height: 1.45;
  white-space: normal;
}

#tooltip::after {
  content: '';
  position: absolute;
  border: 6px solid transparent;
}

/* arrow pointing down (tooltip above cursor) */
#tooltip.arrow-down::after {
  top: 100%;
  left: var(--arrow-x, 50%);
  transform: translateX(-50%);
  border-top-color: var(--ink);
}

/* arrow pointing up (tooltip below cursor) */
#tooltip.arrow-up::after {
  bottom: 100%;
  left: var(--arrow-x, 50%);
  transform: translateX(-50%);
  border-bottom-color: var(--ink);
}

.tip-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--white);
  line-height: 1.3;
  margin-bottom: 5px;
}

.tip-hr {
  border: none;
  border-top: 1px solid rgba(255,255,255,.12);
  margin: 6px 0;
}

.tip-row {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  font-size: 9.5px;
  margin-top: 2px;
}
.tip-k { color: var(--ash); flex-shrink: 0; }
.tip-v { color: var(--fog); text-align: right; }

.tip-pill {
  display: inline-block;
  margin-top: 6px;
  padding: 2px 7px;
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border-radius: 2px;
}
.pill-a { background: var(--canopy); color: var(--white); }
.pill-o { background: var(--driftwood); color: var(--white); }
.pill-s { background: rgba(255,255,255,.1); color: var(--moss); }

/* ── collapsible list ── */
.list-section { padding: 6px 16px 20px; display: none; }
.list-section.show { display: block; }

.list-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 12px;
  background: var(--forest-06);
  border: 1px solid var(--cloud);
  border-bottom: none;
  border-radius: 2px 2px 0 0;
  font-family: var(--f-body);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ash);
  cursor: pointer;
  text-align: left;
  transition: background .12s, color .12s;
}
.list-btn:hover { background: var(--forest-10); color: var(--canopy); }

.chev {
  font-size: 10px;
  color: var(--ash);
  transition: transform .18s;
  flex-shrink: 0;
}
.chev.open { transform: rotate(180deg); }

.list-body {
  display: none;
  border: 1px solid var(--cloud);
  border-radius: 0 0 2px 2px;
  overflow: hidden;
}
.list-body.open { display: block; }

.list-yr {
  padding: 4px 12px;
  background: var(--forest-10);
  border-bottom: 1px solid var(--cloud);
  font-family: var(--f-display);
  font-size: 12px;
  letter-spacing: 0.12em;
  color: var(--ash);
}

.list-tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 11px;
}

.list-tbl thead tr { background: var(--forest); }
.list-tbl thead th {
  padding: 5px 10px;
  text-align: left;
  font-size: 8px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--fog);
}

.list-tbl tbody tr { border-bottom: 1px solid var(--cloud); }
.list-tbl tbody tr:last-child { border-bottom: none; }
.list-tbl tbody tr:hover { background: var(--forest-06); }

.list-tbl td { padding: 6px 10px; color: var(--graphite); vertical-align: middle; }

.td-date { white-space: nowrap; color: var(--ash); font-size: 10px; font-weight: 300; width: 88px; }
.td-name { font-weight: 500; color: var(--ink); }
.td-day  { color: var(--ash); font-size: 10px; white-space: nowrap; }
.td-obs  { font-size: 10px; color: var(--driftwood); }

.chip {
  display: inline-block;
  margin-left: 6px;
  padding: 1px 6px;
  font-size: 7.5px;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  background: var(--drift-15);
  color: #6a4200;
  border-radius: 2px;
  vertical-align: middle;
}

.hidden { display: none !important; }

/* ── collapse bar for hidden months ── */
.collapse-bar {
  grid-column: 1 / -1;   /* full row width */
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 12px;
  background: var(--forest-06);
  border: 1px solid var(--cloud);
  border-radius: 2px;
  cursor: pointer;
  user-select: none;
  transition: background .12s, color .12s;
  gap: 8px;
}
.collapse-bar:hover { background: var(--forest-10); }

.collapse-bar-label {
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ash);
}
.collapse-bar:hover .collapse-bar-label { color: var(--canopy); }

.collapse-bar-meta {
  font-size: 9px;
  color: var(--fog);
  letter-spacing: 0.06em;
  flex: 1;
  text-align: center;
}

.collapse-chev {
  font-size: 10px;
  color: var(--ash);
  transition: transform .18s;
  flex-shrink: 0;
}
.collapse-chev.open { transform: rotate(180deg); }

/* hidden month cards — toggled by JS */
.month-card.collapsed { display: none; }
</style>

</head>
<body>

<!-- Fixed tooltip — lives outside all scrolling containers -->

<div id="tooltip"></div>

<!-- ── thin title bar ── -->

<div class="top-bar" id="top-bar">
  <span class="top-title" id="top-title">NATIONAL HOLIDAYS</span>
  <span class="top-meta" id="top-meta"></span>
  <div class="top-badges">
    <span class="badge badge-count  hidden" id="badge-count"></span>
    <span class="badge badge-shifted hidden" id="badge-shifted"></span>
  </div>
</div>

<!-- ── status ── -->

<div class="status" id="status">
  <div class="spinner" id="spinner"></div>
  <span id="status-msg"></span>
</div>

<!-- ── year tabs ── -->

<div class="year-nav" id="year-nav"></div>

<!-- ── legend ── -->

<div class="legend" id="legend">
  <div class="leg-item"><div class="leg-dot dot-a"></div>Actual date</div>
  <div class="leg-item"><div class="leg-dot dot-o"></div>Observed (shifted)</div>
</div>

<!-- ── calendar ── -->

<div class="cal-wrap">
  <div class="cal-grid" id="cal-grid"></div>
</div>

<!-- ── list ── -->

<div class="list-section" id="list-section">
  <button class="list-btn" onclick="toggleList()">
    Full holiday list
    <span class="chev" id="chev">▼</span>
  </button>
  <div class="list-body" id="list-body"></div>
</div>

<script>
/* ── config ── */
var COUNTRY_NAMES = {
  US:'United States',GB:'United Kingdom',CA:'Canada',AU:'Australia',
  DE:'Germany',FR:'France',JP:'Japan',CN:'China',IN:'India',BR:'Brazil',
  MX:'Mexico',KR:'South Korea',IT:'Italy',ES:'Spain',NL:'Netherlands',
  SG:'Singapore',NZ:'New Zealand',ZA:'South Africa',NG:'Nigeria',AR:'Argentina',
  SE:'Sweden',NO:'Norway',DK:'Denmark',CH:'Switzerland',PT:'Portugal',PL:'Poland',
  TR:'Turkey',EG:'Egypt',SA:'Saudi Arabia',AE:'UAE',IL:'Israel',PH:'Philippines',
  ID:'Indonesia',TH:'Thailand',MY:'Malaysia',VN:'Vietnam',PK:'Pakistan',
  BD:'Bangladesh',KE:'Kenya',GH:'Ghana',UA:'Ukraine',RU:'Russia',CO:'Colombia',
  CL:'Chile',PE:'Peru',IE:'Ireland',BE:'Belgium',AT:'Austria',GR:'Greece',
  FI:'Finland',CZ:'Czechia',HU:'Hungary',RO:'Romania',SK:'Slovakia',HR:'Croatia',
  RS:'Serbia',BG:'Bulgaria',LU:'Luxembourg',IS:'Iceland',EE:'Estonia',LV:'Latvia',
  LT:'Lithuania',SI:'Slovenia',CY:'Cyprus',MT:'Malta',MA:'Morocco',TN:'Tunisia',
  ET:'Ethiopia',TZ:'Tanzania',UG:'Uganda',ZW:'Zimbabwe',CM:'Cameroon',
  CI:'Ivory Coast',SN:'Senegal',DZ:'Algeria',AO:'Angola',MZ:'Mozambique',
  ZM:'Zambia',EC:'Ecuador',VE:'Venezuela',BO:'Bolivia',PY:'Paraguay',UY:'Uruguay',
  PA:'Panama',CR:'Costa Rica',GT:'Guatemala',HN:'Honduras',SV:'El Salvador',
  NI:'Nicaragua',CU:'Cuba',DO:'Dominican Republic',JM:'Jamaica',HT:'Haiti',
  LK:'Sri Lanka',NP:'Nepal',MM:'Myanmar',KH:'Cambodia',LA:'Laos',TW:'Taiwan',
  HK:'Hong Kong',MN:'Mongolia',KZ:'Kazakhstan',UZ:'Uzbekistan',AZ:'Azerbaijan',
  GE:'Georgia',AM:'Armenia',JO:'Jordan',LB:'Lebanon',IQ:'Iraq',IR:'Iran',
  KW:'Kuwait',QA:'Qatar',BH:'Bahrain',OM:'Oman',YE:'Yemen',LY:'Libya',SD:'Sudan'
};

var MONTHS  = ['January','February','March','April','May','June',
               'July','August','September','October','November','December'];
var MSHORT  = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var DSHORT  = ['Su','Mo','Tu','We','Th','Fr','Sa'];
var DFULL   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

var store      = {};   /* { year: [holidays] } */
var activeYear = null;

/* ── helpers ── */
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function fmtDate(s) {
  var p = s.split('-');
  return MSHORT[+p[1]-1] + ' ' + +p[2] + ', ' + p[0];
}
function dayName(s) {
  var p = s.split('-').map(Number);
  return DFULL[new Date(p[0], p[1]-1, p[2]).getDay()];
}
function $(id) { return document.getElementById(id); }
function show(id) { $(id).classList.remove('hidden'); }
function hide(id) { $(id).classList.add('hidden'); }

function setStatus(type, msg) {
  var el = $('status');
  el.className = 'status show ' + type;
  $('status-msg').textContent = msg;
  $('spinner').style.display = type === 'loading' ? 'block' : 'none';
}
function clearStatus() { $('status').className = 'status'; }

/* ── tooltip (fixed position, lives in <body>) ── */
var tipEl      = $('tooltip');
var tipTarget  = null;

function showTip(cell, html) {
  tipEl.innerHTML = html;
  tipEl.style.display = 'block';
  tipEl.className = '';   /* clear old arrow class */
  positionTip(cell);
}

function hideTip() {
  tipEl.style.display = 'none';
  tipEl.className = '';
  tipTarget = null;
}

function positionTip(cell) {
  var cr  = cell.getBoundingClientRect();
  var tw  = tipEl.offsetWidth  || 185;
  var th  = tipEl.offsetHeight || 120;
  var vw  = window.innerWidth;
  var vh  = window.innerHeight;
  var pad = 8;

  /* Preferred: above the cell */
  var spaceAbove = cr.top;
  var spaceBelow = vh - cr.bottom;
  var above = spaceAbove >= th + pad || spaceAbove >= spaceBelow;

  /* Horizontal: center on cell, clamp to viewport */
  var cellCx  = cr.left + cr.width / 2;
  var left    = cellCx - tw / 2;
  left = Math.max(pad, Math.min(left, vw - tw - pad));

  /* Arrow x relative to tooltip box */
  var arrowX  = Math.max(12, Math.min(cellCx - left, tw - 12));
  tipEl.style.setProperty('--arrow-x', arrowX + 'px');

  if (above) {
    tipEl.className = 'arrow-down';
    tipEl.style.top  = (cr.top - th - pad) + 'px';
    tipEl.style.left = left + 'px';
  } else {
    tipEl.className = 'arrow-up';
    tipEl.style.top  = (cr.bottom + pad) + 'px';
    tipEl.style.left = left + 'px';
  }
}

/* reposition on scroll/resize without closing */
window.addEventListener('scroll', function() {
  if (tipTarget) positionTip(tipTarget);
}, true);
window.addEventListener('resize', function() {
  if (tipTarget) positionTip(tipTarget);
});

/* ── fetch ── */
function fetchYear(code, yr) {
  return fetch('https://tallyfy.com/national-holidays/api/' + code + '/' + yr + '.json')
    .then(function(r) { if (!r.ok) throw new Error(); return r.json(); });
}

/* ── init ── */
(function init() {
  var now    = new Date().getFullYear();
  var years  = [now, now + 1];
  var code   = DEFAULT_COUNTRY || 'US';

  setStatus('loading', 'Loading holidays for ' + (COUNTRY_NAMES[code] || code) + '…');

  var tasks = years.map(function(yr) {
    return fetchYear(code, yr)
      .then(function(d) { store[yr] = d.holidays || []; })
      .catch(function()  { store[yr] = null; });
  });

  Promise.all(tasks).then(function() {
    clearStatus();

    var good = years.filter(function(y) { return store[y] !== null; });
    if (!good.length) {
      setStatus('error', 'No data found for ' + (COUNTRY_NAMES[code]||code) + '.');
      return;
    }

    var allH    = [].concat.apply([], good.map(function(y){ return store[y]; }));
    var shifted = allH.filter(function(h){ return h.is_observed_shifted; }).length;
    var range   = good.length === 1 ? '' + good[0] : good[0] + '–' + good[good.length-1];

    /* title bar */
    $('top-title').textContent = (COUNTRY_NAMES[code] || code).toUpperCase() + ' · HOLIDAYS';
    $('top-meta').textContent  = range;
    $('badge-count').textContent = allH.length + ' holiday' + (allH.length !== 1 ? 's' : '');
    show('badge-count');
    if (shifted) {
      $('badge-shifted').textContent = shifted + ' shift' + (shifted !== 1 ? 's' : '');
      show('badge-shifted');
    }

    /* year tabs */
    var nav = $('year-nav');
    nav.innerHTML = '';
    good.forEach(function(yr, i) {
      var t = document.createElement('button');
      t.className   = 'year-tab' + (i === 0 ? ' active' : '');
      t.textContent = yr;
      t.dataset.year = yr;
      t.onclick = function() { switchYear(yr); };
      nav.appendChild(t);
    });
    nav.className = 'year-nav show';
    $('legend').className = 'legend show';

    activeYear = good[0];
    renderCal(activeYear);
    renderList(good);
    $('list-section').className = 'list-section show';
  });
})();

/* ── switch year ── */
function switchYear(yr) {
  activeYear = yr;
  document.querySelectorAll('.year-tab').forEach(function(t) {
    t.classList.toggle('active', parseInt(t.dataset.year, 10) === yr);
  });
  renderCal(yr);
}

/* ── how many months to show upfront ── */
function visibleMonthCount() {
  /* desktop ≥ 681px → show current + next 3 = 4 months
     mobile  ≤ 680px → show current + next 1 = 2 months */
  return window.innerWidth <= 680 ? 2 : 4;
}

/* ── render calendar ── */
function renderCal(year) {
  var holidays = store[year] || [];

  var actMap = {};
  var obsMap = {};

  holidays.forEach(function(h) {
    if (!actMap[h.date]) actMap[h.date] = [];
    actMap[h.date].push(h);
    if (h.is_observed_shifted) {
      if (!obsMap[h.observed_date]) obsMap[h.observed_date] = [];
      obsMap[h.observed_date].push(h);
    }
  });

  var grid = $('cal-grid');
  grid.innerHTML = '';

  /* Which months are "visible" by default?
     - If viewing the current year: current calendar month through current+N-1
     - If viewing a future year: January through N-1 (first N months) */
  var today      = new Date();
  var todayYear  = today.getFullYear();
  var todayMonth = today.getMonth(); /* 0-based */

  var showCount  = visibleMonthCount();
  var firstVis   = (year === todayYear) ? todayMonth : 0;
  var lastVis    = firstVis + showCount - 1; /* inclusive, may exceed 11 */

  /* Collect all cards first so we can build the collapse bar */
  var cards = [];

  for (var mo = 0; mo < 12; mo++) {
    var firstDow    = new Date(year, mo, 1).getDay();
    var daysInMonth = new Date(year, mo+1, 0).getDate();
    var actualsHere = holidays.filter(function(h) {
      return parseInt(h.date.split('-')[1], 10) - 1 === mo;
    });

    var card = document.createElement('div');
    card.className = 'month-card';
    card.dataset.mo = mo; /* store for collapse logic */

    /* mark collapsed if outside visible window */
    var isVisible = (mo >= firstVis && mo <= lastVis);
    if (!isVisible) card.classList.add('collapsed');

    /* header */
    var head = document.createElement('div');
    head.className = 'month-head';
    head.innerHTML =
      '<span class="month-name">' + MONTHS[mo].toUpperCase() + '</span>' +
      (actualsHere.length
        ? '<span class="month-hcount">' + actualsHere.length + '</span>'
        : '');
    card.appendChild(head);

    /* weekday row */
    var wkr = document.createElement('div');
    wkr.className = 'cal-wkdays';
    DSHORT.forEach(function(d) {
      var s = document.createElement('span');
      s.className   = 'cal-wkday';
      s.textContent = d;
      wkr.appendChild(s);
    });
    card.appendChild(wkr);

    /* days */
    var dg = document.createElement('div');
    dg.className = 'cal-days';

    for (var e = 0; e < firstDow; e++) {
      var em = document.createElement('div');
      em.className = 'cal-day empty';
      em.innerHTML = '<div class="cal-day-in"></div>';
      dg.appendChild(em);
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var ds      = year + '-' + pad(mo+1) + '-' + pad(d);
      var actH    = actMap[ds] || [];
      var obsAll  = obsMap[ds] || [];
      var obsOth  = obsAll.filter(function(h) { return actH.indexOf(h) === -1; });

      var isA = actH.length > 0;
      var isO = obsOth.length > 0;

      var cell = document.createElement('div');
      cell.className = 'cal-day';
      if (isA) cell.classList.add('is-a');
      if (isO) cell.classList.add('is-o');

      var inner = document.createElement('div');
      inner.className   = 'cal-day-in';
      inner.textContent = d;
      cell.appendChild(inner);

      if (isA || isO) {
        cell.classList.add('has-tip');

        var html = '';
        var first = true;

        actH.forEach(function(h) {
          if (!first) html += '<hr class="tip-hr">';
          first = false;
          var sh = h.is_observed_shifted;
          html +=
            '<div class="tip-name">' + h.name + '</div>' +
            '<div class="tip-row"><span class="tip-k">Date</span><span class="tip-v">' + fmtDate(h.date) + '</span></div>' +
            '<div class="tip-row"><span class="tip-k">Day</span><span class="tip-v">' + dayName(h.date) + '</span></div>';
          if (sh) {
            html +=
              '<div class="tip-row"><span class="tip-k">Observed</span><span class="tip-v">' + fmtDate(h.observed_date) + '</span></div>' +
              '<span class="tip-pill pill-s">Observed ' + dayName(h.observed_date) + '</span>';
          } else {
            html += '<span class="tip-pill pill-a">Actual date</span>';
          }
        });

        obsOth.forEach(function(h) {
          if (!first) html += '<hr class="tip-hr">';
          first = false;
          html +=
            '<div class="tip-name">' + h.name + '</div>' +
            '<div class="tip-row"><span class="tip-k">Actual</span><span class="tip-v">' + fmtDate(h.date) + '</span></div>' +
            '<div class="tip-row"><span class="tip-k">Observed</span><span class="tip-v">' + fmtDate(h.observed_date) + '</span></div>' +
            '<span class="tip-pill pill-o">Observed here</span>';
        });

        (function(c, h) {
          c.addEventListener('mouseenter', function() { tipTarget = c; showTip(c, h); });
          c.addEventListener('mouseleave', function() { hideTip(); });
        })(cell, html);
      }

      dg.appendChild(cell);
    }

    card.appendChild(dg);
    cards.push(card);
  }

  /* Insert cards into grid, injecting collapse bar before the first hidden card */
  var barInserted = false;
  var hiddenCards = []; /* refs to toggle on bar click */
  var collapseBar = null;

  cards.forEach(function(card) {
    var mo = parseInt(card.dataset.mo, 10);
    var hidden = card.classList.contains('collapsed');

    if (hidden && !barInserted) {
      /* Count how many months are hidden and list their names */
      var hiddenMonths = cards.filter(function(c){ return c.classList.contains('collapsed'); });
      var hiddenNames  = hiddenMonths.map(function(c){ return MONTHS[parseInt(c.dataset.mo,10)]; });

      /* Build count of hidden holidays */
      var hiddenHolCount = 0;
      hiddenMonths.forEach(function(c) {
        var m = parseInt(c.dataset.mo, 10);
        hiddenHolCount += holidays.filter(function(h){
          return parseInt(h.date.split('-')[1], 10) - 1 === m;
        }).length;
      });

      /* Label: e.g. "May – December  ·  8 more months" */
      var firstName = hiddenNames[0];
      var lastName  = hiddenNames[hiddenNames.length - 1];
      var rangeStr  = hiddenNames.length === 1
                        ? firstName
                        : firstName + ' – ' + lastName;

      collapseBar = document.createElement('div');
      collapseBar.className = 'collapse-bar';
      collapseBar.innerHTML =
        '<span class="collapse-bar-label">Show more</span>' +
        '<span class="collapse-bar-meta">' + rangeStr + ' &nbsp;·&nbsp; ' + hiddenMonths.length + ' month' + (hiddenMonths.length !== 1 ? 's' : '') + (hiddenHolCount ? ' · ' + hiddenHolCount + ' holiday' + (hiddenHolCount !== 1 ? 's' : '') : '') + '</span>' +
        '<span class="collapse-chev" id="collapse-chev-' + year + '">▼</span>';

      hiddenCards = hiddenMonths;

      /* Toggle logic */
      (function(bar, hCards, yr) {
        bar.addEventListener('click', function() {
          var chev = $('collapse-chev-' + yr);
          var nowOpen = chev.classList.toggle('open');
          hCards.forEach(function(c) {
            c.classList.toggle('collapsed', !nowOpen);
          });
          bar.querySelector('.collapse-bar-label').textContent = nowOpen ? 'Show less' : 'Show more';
        });
      })(collapseBar, hiddenCards, year);

      grid.appendChild(collapseBar);
      barInserted = true;
    }

    grid.appendChild(card);
  });
}

/* ── render list ── */
function renderList(years) {
  var body = $('list-body');
  body.innerHTML = '';

  years.forEach(function(yr) {
    var hols = store[yr] || [];
    if (!hols.length) return;

    var yh = document.createElement('div');
    yh.className   = 'list-yr';
    yh.textContent = yr;
    body.appendChild(yh);

    var tbl = document.createElement('table');
    tbl.className = 'list-tbl';
    tbl.createTHead().innerHTML =
      '<tr><th>Date</th><th>Holiday</th><th>Day</th><th>Observed</th></tr>';

    var tb = tbl.createTBody();
    hols.forEach(function(h) {
      var sh = h.is_observed_shifted;
      var tr = tb.insertRow();
      tr.innerHTML =
        '<td class="td-date">' + fmtDate(h.date) + '</td>' +
        '<td class="td-name">' + h.name + (sh ? '<span class="chip">Shifted</span>' : '') + '</td>' +
        '<td class="td-day">'  + dayName(h.observed_date || h.date) + '</td>' +
        '<td class="td-obs">'  + (sh ? fmtDate(h.observed_date) : '—') + '</td>';
    });

    body.appendChild(tbl);
  });
}

/* ── toggle list ── */
function toggleList() {
  var open = $('list-body').classList.toggle('open');
  $('chev').classList.toggle('open', open);
}
</script>
