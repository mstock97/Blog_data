#fx_eur_usd .row1{

  gap:6px;align-items:end;padding:12px;

#fx_eur_usd .fxsel:focus{outline:none;border-color:#2D6A4F}
#fx_eur_usd .fxamt{
  background:#F7F5F0;border:1.5px solid #EFEFEF;border-radius:3px;
  padding:5px 8px;font-family:'Bebas Neue','DM Sans',sans-serif;
  font-size:1.25rem;letter-spacing:.03em;color:#0F0F0F;

#fx_eur_usd .fxamt:focus{outline:none;border-color:#2D6A4F}
#fx_eur_usd .fxamt::placeholder{color:#ccc}
#fx_eur_usd input[type=number]::-webkit-inner-spin-button,
#fx_eur_usd input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
#fx_eur_usd .swapcol{display:flex;align-items:flex-end;justify-content:center;padding-bottom:1px}
#fx_eur_usd .swapbtn{
  background:#1E4034;color:#fff;border:none;width:28px;height:28px;
  border-radius:50%;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background .2s,transform .3s
}
#fx_eur_usd .swapbtn:hover{background:#2D6A4F;transform:rotate(180deg)}
#fx_eur_usd .swapbtn svg{width:12px;height:12px}
#fx_eur_usd .rcell{display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
#fx_eur_usd .rval{
  font-family:'Bebas Neue','DM Sans',sans-serif;
  font-size:1.6rem;color:#1E4034;line-height:1;letter-spacing:.02em

#fx_eur_usd .rmeta{font-size:9px;color:#8C8C8C;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#fx_eur_usd .row2{background:#fff;border:1px solid #EFEFEF;border-radius:0 0 4px 4px}
#fx_eur_usd .ctoggle{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:8px 12px;background:none;border:none;
  border-top:1px solid #EFEFEF;cursor:pointer;font-family:inherit;
  font-size:10px;color:#8C8C8C;letter-spacing:.1em;text-transform:uppercase;
  transition:background .15s
}
#fx_eur_usd .ctoggle:hover{background:#F7F5F0}
#fx_eur_usd .ctgl{display:flex;align-items:center;gap:6px}
#fx_eur_usd .chev{transition:transform .25s;display:flex;align-items:center}
#fx_eur_usd .cbody{display:none;padding:10px 12px}
#fx_eur_usd .chead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
#fx_eur_usd .ctitle{font-size:10px;font-weight:500;color:#3D3D3D;letter-spacing:.02em}
#fx_eur_usd .pbtns{display:flex;gap:3px}
#fx_eur_usd .fx-pbtn{

#fx_eur_usd .cnodata{padding:16px 0;text-align:center;font-size:11px;color:#8C8C8C;font-style:italic}
#fx_eur_usd canvas{display:block;width:100%!important}

var W          = "fx_eur_usd";
var chartBuilt = false;
var fxChart    = null;
var per        = 9999;
var _tMap      = {};
var _rawDates  = [];

function $el(id) { return document.getElementById(W + "_" + id); }

function isTier1(c) { return !!TIER1[c]; }

function fmt(n) {
  if (n == null || isNaN(n)) return "\u2014";
  if (n >= 10000) return n.toLocaleString("en-US", {maximumFractionDigits:2});
  if (n >= 100)   return n.toFixed(2);
  if (n >= 1)     return n.toFixed(4);
  return n.toFixed(6);
}

function setOpt(suffix, val) {
  var el = $el(suffix);
  for (var i = 0; i < el.options.length; i++) {
    if (el.options[i].value === val) { el.selectedIndex = i; return; }
  }
}

function show(id, on) {
  var el = $el(id);
  if (el) el.style.display = on ? "block" : "none";
}

function xRate(a, b) {
  if (!RATES[a] || !RATES[b]) return null;
  return RATES[b] / RATES[a];
}

function updateDisplay() {
  var f    = $el("from").value;
  var t    = $el("to").value;
  var amt  = parseFloat($el("fromv").value) || 1;
  var rate = xRate(f, t);
  if (!rate) return;
  var result = amt * rate;
  $el("rlbl").textContent  = fmt(amt) + " " + f + " =";
  $el("rval").textContent  = fmt(result);
  $el("rmeta").textContent = t + "  \u00b7  1 " + f + " = " + fmt(rate) + " " + t;
  // Also update the To input field so it shows the converted amount
  $el("tov").value = result.toFixed(6);
}

window[W + "_fwd"] = function() {
  var f = $el("from").value, t = $el("to").value;
  var amt = parseFloat($el("fromv").value);
  var rate = xRate(f, t);
  if (!rate || isNaN(amt)) return;
  $el("tov").value = (amt * rate).toFixed(6);
  updateDisplay();
};

window[W + "_rev"] = function() {
  var f = $el("from").value, t = $el("to").value;
  var amt = parseFloat($el("tov").value);
  var rate = xRate(t, f);
  if (!rate || isNaN(amt)) return;
  $el("fromv").value = (amt * rate).toFixed(6);
  updateDisplay();
};

window[W + "_go"] = function() {
  window[W + "_fwd"]();
  updateChartSection();
  if (chartBuilt) refreshChart();
};

window[W + "_swap"] = function() {
  var f = $el("from").value, t = $el("to").value;
  setOpt("from", t);
  setOpt("to", f);
  window[W + "_go"]();
};

function updateChartSection() {
  var f = $el("from").value, t = $el("to").value;
  if (isTier1(f) && isTier1(t)) {
    show("chartNoData", false);
    show("chartArea",   true);
    $el("ctitle").textContent = f + "/" + t;
  } else {
    show("chartNoData", true);
    show("chartArea",   false);
    var missing = [f, t].filter(function(c) { return !isTier1(c); }).join(", ");
    $el("noDataMsg").textContent =
      "Historical chart unavailable for " + missing + " — not published by ECB.";
  }
}

// ── Chart series ──────────────────────────────────────────────────
function series() {
  var f  = $el("from").value, t = $el("to").value;
  var n  = Math.min(per, DATES.length);
  var fH = HIST[f], tH = HIST[t];
  if (!fH || !tH || n === 0) return { data: [], n: 0 };

  var ds = DATES.slice(-n);
  var fs = fH.slice(-n);
  var ts = tH.slice(-n);
  var data = fs.map(function(v, i) {
    return (v != null && ts[i] != null) ? +((ts[i] / v).toFixed(5)) : null;
  });

  var tMap = {}, lastYr = -1, lastMo = -1;
  for (var i = 0; i < n; i++) {
    var dt  = new Date(ds[i]);
    var yr  = dt.getFullYear();
    var mo  = dt.getMonth();
    var dom = dt.getDate();
    var ms  = dt.toLocaleString("en-US", { month: "short" });
    if (per >= 9999) {
      if (yr !== lastYr) { tMap[i] = String(yr); lastYr = yr; }
    } else if (per >= 365) {
      if (mo !== lastMo) { tMap[i] = ms; lastMo = mo; }
    } else if (per >= 180) {
      if (mo !== lastMo && mo % 2 === 0) {
        tMap[i] = ms + " '" + String(yr).slice(2); lastMo = mo;
      }
    } else {
      var steps = [0, Math.round(n/3), Math.round(2*n/3), n-1];
      if (steps.indexOf(i) !== -1) tMap[i] = ms + " " + dom;
    }
  }
  _tMap = tMap;
  _rawDates = ds;
  return { data: data, n: n };
}

function buildChart() {
  var ctx = document.getElementById(W + "_c").getContext("2d");
  var s = series();
  if (!s.n) return;
  fxChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: Array.from({ length: s.n }, function(_, i) { return i; }),
      datasets: [{
        data: s.data,
        borderColor: "#52B788",
        borderWidth: 1.5,
        fill: true,
        backgroundColor: function(c) {
          var g = c.chart.ctx.createLinearGradient(0, 0, 0, 110);
          g.addColorStop(0, "rgba(82,183,136,0.15)");
          g.addColorStop(1, "rgba(82,183,136,0)");
          return g;
        },
        pointRadius: 0,
        pointHoverRadius: 3,
        pointHoverBackgroundColor: "#52B788",
        tension: 0.3,
        spanGaps: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1E4034",
          titleColor: "rgba(201,212,197,0.9)",
          bodyColor: "#fff",
          titleFont:  { size: 10 },
          bodyFont:   { size: 12, weight: "500" },
          padding: 9,
          displayColors: false,
          callbacks: {
            title: function(items) { return _rawDates[items[0].dataIndex] || ""; },
            label: function(item) {
              var f = $el("from").value, t = $el("to").value;
              return item.raw == null ? "\u2014" : " 1 " + f + " = " + item.raw + " " + t;
            }
          }
        }
      },
      scales: {
        x: {
          type: "linear", min: 0, max: Math.max(0, s.n - 1),
          grid: { display: false }, border: { display: false },
          ticks: {
            color: "#8C8C8C", font: { size: 9 },
            maxRotation: 0, autoSkip: false,
            callback: function(val) {
              var label = _tMap[Math.round(val)];
              return label != null ? label : null;
            }
          }
        },
        y: {
          position: "right", grid: { color: "#F2F2F2" }, border: { display: false },
          ticks: { color: "#8C8C8C", font: { size: 9 }, maxTicksLimit: 4 }
        }
      }
    }
  });
}

function refreshChart() {
  if (!fxChart) return;
  var s = series();
  if (!s.n) return;
  fxChart.data.labels = Array.from({ length: s.n }, function(_, i) { return i; });
  fxChart.data.datasets[0].data = s.data;
  fxChart.options.scales.x.max = Math.max(0, s.n - 1);
  fxChart.update();
}

window[W + "_toggleChart"] = function() {
  var body   = $el("cbody");
  var chev   = $el("chev");
  var isOpen = body.style.display === "block";
  body.style.display = isOpen ? "none" : "block";
  chev.style.transform = isOpen ? "" : "rotate(180deg)";
  if (!isOpen) {
    var f = $el("from").value, t = $el("to").value;
    if (!isTier1(f) || !isTier1(t)) return;
    if (!chartBuilt) { buildChart(); chartBuilt = true; }
    else refreshChart();
  }
};

window[W + "_per"] = function(days, btn) {
  per = days;
  var btns = document.querySelectorAll("#" + W + " .fx-pbtn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("on");
  btn.classList.add("on");
  refreshChart();
};

// ── Boot: rates are already embedded, just initialise the UI ─────
setOpt("from", DEFAULT_FROM);
setOpt("to",   DEFAULT_TO);
updateDisplay();
updateChartSection();

})();
</script>
