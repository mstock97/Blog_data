#fx_eur_usd .fxsel:focus{outline:none;border-color:#2D6A4F}

#fx_eur_usd input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

#fx_eur_usd .swapbtn:hover{background:#2D6A4F;transform:rotate(180deg)}
#fx_eur_usd .swapbtn svg{width:12px;height:12px}
#fx_eur_usd .rcell{display:flex;flex-direction:column;justify-content:flex-end;gap:2px}
#fx_eur_usd .rspinwrap{display:flex;align-items:center;gap:6px}
#fx_eur_usd .fxspinner{
  width:14px;height:14px;border:2px solid #EFEFEF;border-top-color:#52B788;
  border-radius:50%;animation:fx-spin .7s linear infinite;flex-shrink:0

#fx_eur_usd .rval{

#fx_eur_usd .row2{background:#fff;border:1px solid #EFEFEF;border-radius:0 0 4px 4px}
#fx_eur_usd .ctoggle{

#fx_eur_usd .ctgl{display:flex;align-items:center;gap:6px}

#fx_eur_usd .cbody{display:none;padding:10px 12px}
#fx_eur_usd .chead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px}
#fx_eur_usd .ctitle{font-size:10px;font-weight:500;color:#3D3D3D;letter-spacing:.02em}

<script>
(function() {

// ── Config (edit these two lines to change defaults) ─────────────
var DEFAULT_FROM = "EUR";
var DEFAULT_TO   = "USD";
// ─────────────────────────────────────────────────────────────────

var TIER1      = {"AUD": "Australian Dollar", "BGN": "Bulgarian Lev", "BRL": "Brazilian Real", "CAD": "Canadian Dollar", "CHF": "Swiss Franc", "CNY": "Chinese Yuan", "CZK": "Czech Koruna", "DKK": "Danish Krone", "EUR": "Euro", "GBP": "British Pound", "HKD": "Hong Kong Dollar", "HUF": "Hungarian Forint", "IDR": "Indonesian Rupiah", "ILS": "Israeli Shekel", "INR": "Indian Rupee", "ISK": "Icelandic Krona", "JPY": "Japanese Yen", "KRW": "South Korean Won", "MXN": "Mexican Peso", "MYR": "Malaysian Ringgit", "NOK": "Norwegian Krone", "NZD": "New Zealand Dollar", "PHP": "Philippine Peso", "PLN": "Polish Zloty", "RON": "Romanian Leu", "SEK": "Swedish Krona", "SGD": "Singapore Dollar", "THB": "Thai Baht", "TRY": "Turkish Lira", "USD": "US Dollar", "ZAR": "South African Rand"};
var TIER2      = {"AED": "UAE Dirham", "AFN": "Afghan Afghani", "ALL": "Albanian Lek", "AMD": "Armenian Dram", "ANG": "Netherlands Antillean Guilder", "AOA": "Angolan Kwanza", "ARS": "Argentine Peso", "AWG": "Aruban Florin", "AZN": "Azerbaijani Manat", "BAM": "Bosnia-Herzegovina Mark", "BBD": "Barbadian Dollar", "BDT": "Bangladeshi Taka", "BHD": "Bahraini Dinar", "BIF": "Burundian Franc", "BMD": "Bermudian Dollar", "BND": "Brunei Dollar", "BOB": "Bolivian Boliviano", "BSD": "Bahamian Dollar", "BTN": "Bhutanese Ngultrum", "BWP": "Botswanan Pula", "BYN": "Belarusian Ruble", "BZD": "Belize Dollar", "CDF": "Congolese Franc", "CLP": "Chilean Peso", "COP": "Colombian Peso", "CRC": "Costa Rican Colon", "CUP": "Cuban Peso", "CVE": "Cape Verdean Escudo", "DJF": "Djiboutian Franc", "DOP": "Dominican Peso", "DZD": "Algerian Dinar", "EGP": "Egyptian Pound", "ERN": "Eritrean Nakfa", "ETB": "Ethiopian Birr", "FJD": "Fijian Dollar", "FKP": "Falkland Islands Pound", "GEL": "Georgian Lari", "GHS": "Ghanaian Cedi", "GIP": "Gibraltar Pound", "GMD": "Gambian Dalasi", "GNF": "Guinean Franc", "GTQ": "Guatemalan Quetzal", "GYD": "Guyanaese Dollar", "HNL": "Honduran Lempira", "HRK": "Croatian Kuna", "HTG": "Haitian Gourde", "IQD": "Iraqi Dinar", "IRR": "Iranian Rial", "JMD": "Jamaican Dollar", "JOD": "Jordanian Dinar", "KES": "Kenyan Shilling", "KGS": "Kyrgystani Som", "KHR": "Cambodian Riel", "KMF": "Comorian Franc", "KPW": "North Korean Won", "KWD": "Kuwaiti Dinar", "KYD": "Cayman Islands Dollar", "KZT": "Kazakhstani Tenge", "LAK": "Laotian Kip", "LBP": "Lebanese Pound", "LKR": "Sri Lankan Rupee", "LRD": "Liberian Dollar", "LSL": "Lesotho Loti", "LYD": "Libyan Dinar", "MAD": "Moroccan Dirham", "MDL": "Moldovan Leu", "MGA": "Malagasy Ariary", "MKD": "Macedonian Denar", "MMK": "Myanma Kyat", "MNT": "Mongolian Tugrik", "MOP": "Macanese Pataca", "MRU": "Mauritanian Ouguiya", "MUR": "Mauritian Rupee", "MVR": "Maldivian Rufiyaa", "MWK": "Malawian Kwacha", "MZN": "Mozambican Metical", "NAD": "Namibian Dollar", "NGN": "Nigerian Naira", "NIO": "Nicaraguan Cordoba", "NPR": "Nepalese Rupee", "OMR": "Omani Rial", "PAB": "Panamanian Balboa", "PEN": "Peruvian Sol", "PGK": "Papua New Guinean Kina", "PKR": "Pakistani Rupee", "PYG": "Paraguayan Guarani", "QAR": "Qatari Rial", "RSD": "Serbian Dinar", "RUB": "Russian Ruble", "RWF": "Rwandan Franc", "SAR": "Saudi Riyal", "SBD": "Solomon Islands Dollar", "SCR": "Seychellois Rupee", "SDG": "Sudanese Pound", "SHP": "Saint Helena Pound", "SLL": "Sierra Leonean Leone", "SOS": "Somali Shilling", "SRD": "Surinamese Dollar", "STN": "Sao Tome Dobra", "SVC": "Salvadoran Colon", "SYP": "Syrian Pound", "SZL": "Swazi Lilangeni", "TJS": "Tajikistani Somoni", "TMT": "Turkmenistani Manat", "TND": "Tunisian Dinar", "TOP": "Tongan Paanga", "TTD": "Trinidad Dollar", "TWD": "New Taiwan Dollar", "TZS": "Tanzanian Shilling", "UAH": "Ukrainian Hryvnia", "UGX": "Ugandan Shilling", "UYU": "Uruguayan Peso", "UZS": "Uzbekistan Som", "VES": "Venezuelan Bolivar", "VND": "Vietnamese Dong", "VUV": "Vanuatu Vatu", "WST": "Samoan Tala", "XAF": "CFA Franc BEAC", "XCD": "East Caribbean Dollar", "XOF": "CFA Franc BCEAO", "XPF": "CFP Franc", "YER": "Yemeni Rial", "ZMW": "Zambian Kwacha", "ZWL": "Zimbabwean Dollar"};
var ALL_CCY    = Object.assign({}, TIER1, TIER2);
var START_DATE = "2021-04-20";
var W          = "fx_eur_usd";

var rates     = {};
var hist      = {};
var histDates = [];
var histReady = false;
var histError = false;
var chartBuilt = false;
var fxChart   = null;
var per       = 9999;
var _tMap     = {};
var _rawDates = [];

function $el(id) {
  return document.getElementById(W + "_" + id);
}

function isTier1(c) { return !!TIER1[c]; }

function fmt(n) {
  if (n == null || isNaN(n)) return "—";
  if (n >= 10000) return n.toLocaleString("en-US", {maximumFractionDigits:2});
  if (n >= 100)   return n.toFixed(2);
  if (n >= 1)     return n.toFixed(4);
  return n.toFixed(6);
}

function setOpt(suffix, val) {
  var el = $el(suffix);
  for (var i = 0; i < el.options.length; i++) {
    if (el.options[i].value === val) { el.selectedIndex = i; return; }
  }
}

function show(id, on) {
  var el = $el(id);
  if (el) el.style.display = on ? "block" : "none";
}

function showFlex(id, on) {
  var el = $el(id);
  if (el) el.style.display = on ? "flex" : "none";
}

// Cross-rate: RATES are all per 1 EUR, so A->B = rates[B]/rates[A]
function xRate(a, b) {
  if (!rates[a] || !rates[b]) return null;
  return rates[b] / rates[a];
}

function updateDisplay() {
  var f    = $el("from").value;
  var t    = $el("to").value;
  var amt  = parseFloat($el("fromv").value) || 1;
  var rate = xRate(f, t);
  if (!rate) return;
  $el("rlbl").textContent  = fmt(amt) + " " + f + " =";
  $el("rval").textContent  = fmt(amt * rate);
  $el("rmeta").textContent = t + "  \u00b7  1 " + f + " = " + fmt(rate) + " " + t;
  showFlex("rspinner", false);
}

// ── Converter controls ────────────────────────────────────────────
window[W + "_fwd"] = function() {
  var f = $el("from").value, t = $el("to").value;
  var amt = parseFloat($el("fromv").value);
  var rate = xRate(f, t);
  if (!rate || isNaN(amt)) return;
  $el("tov").value = (amt * rate).toFixed(6);
  updateDisplay();
};

window[W + "_rev"] = function() {
  var f = $el("from").value, t = $el("to").value;
  var amt = parseFloat($el("tov").value);
  var rate = xRate(t, f);
  if (!rate || isNaN(amt)) return;
  $el("fromv").value = (amt * rate).toFixed(6);
  updateDisplay();
};

window[W + "_go"] = function() {
  window[W + "_fwd"]();
  updateChartSection();
  if (chartBuilt) refreshChart();
};

window[W + "_swap"] = function() {
  var f = $el("from").value, t = $el("to").value;
  setOpt("from", t);
  setOpt("to", f);
  window[W + "_go"]();
};

function updateChartSection() {
  var f = $el("from").value, t = $el("to").value;
  if (isTier1(f) && isTier1(t)) {
    show("chartNoData", false);
    show("chartArea",   true);
    $el("ctitle").textContent = f + "/" + t;
  } else {
    show("chartNoData", true);
    show("chartArea",   false);
    var missing = [f, t].filter(function(c) { return !isTier1(c); }).join(", ");
    $el("noDataMsg").textContent =
      "Historical chart unavailable for " + missing +
      " — not published by ECB.";
  }
}

// ── Fetch current rates ───────────────────────────────────────────
function fetchRates() {
  showFlex("rspinner", true);
  // Try Frankfurter first
  var req = new XMLHttpRequest();
  req.open("GET", "https://api.frankfurter.app/latest?base=EUR", true);
  req.timeout = 8000;
  req.onload = function() {
    if (req.status === 200) {
      try {
        var data = JSON.parse(req.responseText);
        rates = data.rates;
        rates["EUR"] = 1.0;
        updateDisplay();
        return;
      } catch(e) {}
    }
    fetchRatesFallback();
  };
  req.onerror   = fetchRatesFallback;
  req.ontimeout = fetchRatesFallback;
  req.send();
}

function fetchRatesFallback() {
  // Fallback: open.er-api.com (broader coverage, USD base)
  var req = new XMLHttpRequest();
  req.open("GET", "https://open.er-api.com/v6/latest/EUR", true);
  req.timeout = 8000;
  req.onload = function() {
    if (req.status === 200) {
      try {
        var data = JSON.parse(req.responseText);
        rates = data.rates;
        rates["EUR"] = 1.0;
        updateDisplay();
        return;
      } catch(e) {}
    }
    // Both failed — show error
    showFlex("rspinner", false);
    $el("rval").textContent = "Unavailable";
  };
  req.onerror = req.ontimeout = function() {
    showFlex("rspinner", false);
    $el("rval").textContent = "Unavailable";
  };
  req.send();
}

// ── Fetch 5yr history (background) ───────────────────────────────
function fetchHistory() {
  var url = "https://api.frankfurter.app/" + START_DATE + "..?base=EUR";
  var req = new XMLHttpRequest();
  req.open("GET", url, true);
  req.timeout = 30000;
  req.onload = function() {
    if (req.status === 200) {
      try {
        var data = JSON.parse(req.responseText);
        histDates = Object.keys(data.rates).sort();
        hist = { EUR: histDates.map(function() { return 1.0; }) };
        var sample = data.rates[histDates[0]] || {};
        Object.keys(sample).forEach(function(ccy) {
          hist[ccy] = histDates.map(function(d) {
            return data.rates[d][ccy] !== undefined ? data.rates[d][ccy] : null;
          });
        });
        histReady = true;
        onHistoryReady();
        return;
      } catch(e) {}
    }
    fetchHistoryFallback();
  };
  req.onerror = req.ontimeout = fetchHistoryFallback;
  req.send();
}

function fetchHistoryFallback() {
  // ECB direct CSV fallback
  var url = "https://data-api.ecb.europa.eu/service/data/EXR/D..EUR.SP00.A" +
            "?startPeriod=" + START_DATE + "&format=csvdata&detail=dataonly";
  var req = new XMLHttpRequest();
  req.open("GET", url, true);
  req.timeout = 30000;
  req.onload = function() {
    if (req.status === 200) {
      try {
        var parsed = parseECBcsv(req.responseText);
        histDates = parsed.dates;
        hist      = parsed.byCcy;
        hist["EUR"] = histDates.map(function() { return 1.0; });
        histReady = true;
        onHistoryReady();
        return;
      } catch(e) {}
    }
    histError = true;
    onHistoryReady();
  };
  req.onerror = req.ontimeout = function() {
    histError = true;
    onHistoryReady();
  };
  req.send();
}

function parseECBcsv(text) {
  var lines  = text.trim().split("\n");
  var header = lines[0].split(",");
  var ci = header.indexOf("CURRENCY");
  var di = header.indexOf("TIME_PERIOD");
  var vi = header.indexOf("OBS_VALUE");
  var byDateCcy = {};
  for (var i = 1; i < lines.length; i++) {
    var cols = lines[i].split(",");
    var ccy  = (cols[ci] || "").trim();
    var d    = (cols[di] || "").trim();
    var val  = parseFloat(cols[vi]);
    if (ccy && d && !isNaN(val)) {
      if (!byDateCcy[d]) byDateCcy[d] = {};
      byDateCcy[d][ccy] = val;
    }
  }
  var dates = Object.keys(byDateCcy).sort();
  var ccySet = {};
  dates.forEach(function(d) {
    Object.keys(byDateCcy[d]).forEach(function(c) { ccySet[c] = true; });
  });
  var byCcy = {};
  Object.keys(ccySet).forEach(function(ccy) {
    byCcy[ccy] = dates.map(function(d) {
      return byDateCcy[d][ccy] !== undefined ? byDateCcy[d][ccy] : null;
    });
  });
  return { dates: dates, byCcy: byCcy };
}

function onHistoryReady() {
  // Chart body might be open — update it
  var body = $el("cbody");
  var isOpen = body && body.style.display === "block";
  show("cspinner", false);
  if (histError) {
    show("chartArea",   false);
    show("chartNoData", true);
    $el("noDataMsg").textContent = "Historical data temporarily unavailable.";
    return;
  }
  if (isOpen) {
    show("chartArea", true);
    if (!chartBuilt) { buildChart(); chartBuilt = true; }
    else refreshChart();
  }
}

// ── Chart ─────────────────────────────────────────────────────────
function series() {
  var f  = $el("from").value, t = $el("to").value;
  var n  = Math.min(per, histDates.length);
  var fH = hist[f], tH = hist[t];
  if (!fH || !tH || n === 0) return { data: [], n: 0 };

  var ds = histDates.slice(-n);
  var fs = fH.slice(-n);
  var ts = tH.slice(-n);
  var data = fs.map(function(v, i) {
    return (v != null && ts[i] != null) ? +((ts[i] / v).toFixed(5)) : null;
  });

  // Build tick map: index -> label string (only for ticks we want shown)
  var tMap = {}, lastYr = -1, lastMo = -1;
  for (var i = 0; i < n; i++) {
    var dt  = new Date(ds[i]);
    var yr  = dt.getFullYear();
    var mo  = dt.getMonth();
    var dom = dt.getDate();
    var ms  = dt.toLocaleString("en-US", { month: "short" });
    if (per >= 9999) {
      if (yr !== lastYr) { tMap[i] = String(yr); lastYr = yr; }
    } else if (per >= 365) {
      if (mo !== lastMo) { tMap[i] = ms; lastMo = mo; }
    } else if (per >= 180) {
      if (mo !== lastMo && mo % 2 === 0) {
        tMap[i] = ms + " '" + String(yr).slice(2); lastMo = mo;
      }
    } else {
      var steps = [0, Math.round(n/3), Math.round(2*n/3), n-1];
      if (steps.indexOf(i) !== -1) tMap[i] = ms + " " + dom;
    }
  }
  _tMap     = tMap;
  _rawDates = ds;
  return { data: data, n: n };
}

function buildChart() {
  var ctx = document.getElementById(W + "_c").getContext("2d");
  var s = series();
  if (!s.n) return;

  fxChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: Array.from({ length: s.n }, function(_, i) { return i; }),
      datasets: [{
        data: s.data,
        borderColor: "#52B788",
        borderWidth: 1.5,
        fill: true,
        backgroundColor: function(c) {
          var g = c.chart.ctx.createLinearGradient(0, 0, 0, 110);
          g.addColorStop(0, "rgba(82,183,136,0.15)");
          g.addColorStop(1, "rgba(82,183,136,0)");
          return g;
        },
        pointRadius: 0,
        pointHoverRadius: 3,
        pointHoverBackgroundColor: "#52B788",
        tension: 0.3,
        spanGaps: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      interaction: { mode: "index", intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#1E4034",
          titleColor: "rgba(201,212,197,0.9)",
          bodyColor: "#fff",
          titleFont:  { size: 10 },
          bodyFont:   { size: 12, weight: "500" },
          padding: 9,
          displayColors: false,
          callbacks: {
            title: function(items) {
              return _rawDates[items[0].dataIndex] || "";
            },
            label: function(item) {
              var f = $el("from").value, t = $el("to").value;
              return item.raw == null ? "—" : " 1 " + f + " = " + item.raw + " " + t;
            }
          }
        }
      },
      scales: {
        x: {
          type: "linear",
          min: 0,
          max: Math.max(0, s.n - 1),
          grid:   { display: false },
          border: { display: false },
          ticks: {
            color: "#8C8C8C",
            font:  { size: 9 },
            maxRotation: 0,
            autoSkip: false,
            callback: function(val) {
              var label = _tMap[Math.round(val)];
              return label != null ? label : null;
            }
          }
        },
        y: {
          position: "right",
          grid:   { color: "#F2F2F2" },
          border: { display: false },
          ticks:  { color: "#8C8C8C", font: { size: 9 }, maxTicksLimit: 4 }
        }
      }
    }
  });
}

function refreshChart() {
  if (!fxChart) return;
  var s = series();
  if (!s.n) return;
  fxChart.data.labels = Array.from({ length: s.n }, function(_, i) { return i; });
  fxChart.data.datasets[0].data = s.data;
  fxChart.options.scales.x.max = Math.max(0, s.n - 1);
  fxChart.update();
}

// ── Collapsible chart ─────────────────────────────────────────────
window[W + "_toggleChart"] = function() {
  var body   = $el("cbody");
  var chev   = $el("chev");
  var isOpen = body.style.display === "block";
  body.style.display = isOpen ? "none" : "block";
  chev.style.transform = isOpen ? "" : "rotate(180deg)";
  if (!isOpen) {
    var f = $el("from").value, t = $el("to").value;
    if (!isTier1(f) || !isTier1(t)) return;
    if (histReady) {
      show("cspinner", false);
      show("chartArea", true);
      if (!chartBuilt) { buildChart(); chartBuilt = true; }
      else refreshChart();
    } else {
      show("cspinner", true);
      show("chartArea", false);
    }
  }
};

window[W + "_per"] = function(days, btn) {
  per = days;
  var btns = document.querySelectorAll("#" + W + " .fx-pbtn");
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove("on");
  btn.classList.add("on");
  refreshChart();
};

// ── Boot ──────────────────────────────────────────────────────────
setOpt("from", DEFAULT_FROM);
setOpt("to",   DEFAULT_TO);
updateChartSection();

// Fetch rates immediately
fetchRates();

// Kick off history fetch in background (will be ready when user opens chart)
fetchHistory();

})();
</script>
